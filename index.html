<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        /* Estilização Geral FioCerto */
        body { 
            background-color: #060b13; 
            color: #ffd700; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
            overflow: hidden;
        }

        #projeto-container { 
            position: relative; 
            width: 1000px; 
            height: 600px; 
            background: #000; 
            border: 3px solid #1f2937;
            margin-top: 20px;
        }

        .camada-full { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
        }

        /* Balão NBR-5410 com Interrupção por Clique */
        #balao-informativo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(4, 10, 20, 0.98);
            border: 2px solid #ffd700; /* Yellow Gold */
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            z-index: 9999;
            display: none; /* Inicia oculto */
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
        }

        .texto-norma {
            display: block;
            color: #ff0000; /* Vermelho solicitado */
            font-weight: bold;
            margin-top: 12px;
            font-size: 0.9em;
        }

        /* Pontos de Interação */
        .ponto { 
            position: absolute; 
            width: 26px; height: 26px; 
            border-radius: 50%; 
            cursor: pointer; 
            z-index: 100; 
            transform: translate(-50%, -50%); 
            border: 2px solid #fff;
        }
        .fase { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .verde { background: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }

        #instrucao-topo {
            margin-top: 20px;
            font-size: 20px;
            text-transform: uppercase;
            color: #00f0ff;
        }
    </style>
</head>
<body>

    <div id="instrucao-topo">Siga os pontos para instalar a FASE 1</div>

    <div id="projeto-container">
        <!-- Imagem base do laboratório -->
        <img src="ambiente.jpg" style="width:100%; height:100%; opacity: 0.7;">
        
        <div id="camadas-fios"></div>

        <!-- Balão Informativo -->
        <div id="balao-informativo" onclick="fecharBalao()">
            <div style="color: #fff; font-size: 20px; font-weight: bold;">
                A fase pode ser de qualquer cor
            </div>
            <span class="texto-norma">
                (Item 6.1.5.3.4 da NBR-5410)
            </span>
            <div style="font-size: 11px; color: #555; margin-top: 20px; text-transform: uppercase;">
                [ Clique para fechar e continuar ]
            </div>
        </div>

        <!-- Elementos de clique -->
        <div id="pontoA" class="ponto fase" style="top: 38%; left: 27%;"></div>
        <div id="pontoB" class="ponto fase" style="top: 79.3%; left: 40.5%; display: none;"></div>
    </div>

    <script>
        const containerFios = document.getElementById('camadas-fios');
        const balao = document.getElementById('balao-informativo');
        const pA = document.getElementById('pontoA');
        const pB = document.getElementById('pontoB');

        // Logica de ativação dos pontos
        pA.onclick = function() {
            this.classList.add('verde');
            pB.style.display = 'block';
        };

        pB.onclick = function() {
            this.classList.add('verde');
            animarFase1();
        };

        function animarFase1() {
            const imgCabo = document.createElement('img');
            imgCabo.className = "camada-full";
            containerFios.appendChild(imgCabo);

            let frame = 0;
            const totalFrames = 24; // Conforme sua estrutura de pastas

            const temporizador = setInterval(() => {
                // Caminho da imagem conforme seu padrão de pastas
                imgCabo.src = `FASE1/quadro${frame.toString().padStart(4, '0')}.png`;
                
                if (frame >= totalFrames) {
                    clearInterval(temporizador);
                    // EXIBE O BALÃO ASSIM QUE O ÚLTIMO FRAME CARREGA
                    balao.style.display = 'block';
                }
                frame++;
            }, 45);
        }

        function fecharBalao() {
            balao.style.display = 'none';
            document.getElementById('instrucao-topo').innerText = "FASE 1 CONCLUÍDA. PROPRIA ETAPA: NEUTRO.";
            // Aqui você dispararia a lógica para a próxima fiação
            console.log("Usuário leu a norma e fechou o balão.");
        }
    </script>
</body>
</html>
