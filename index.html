<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100vw; height: 100vh; overflow: hidden;
        }

        /* --- PAINEL DE STATUS --- */
        #painel-status {
            width: 100%; max-width: 1200px;
            margin: 1vh auto 2vh auto;
            padding: 20px 40px;
            background: rgba(4, 10, 20, 0.9);
            border: 1px solid #16222f;
            border-radius: 12px;
            text-align: center;
            display: flex; align-items: center; justify-content: center;
            min-height: 80px;
        }

        #instrucao {
            font-family: 'Arial Narrow', Arial, sans-serif;
            color: #ffd700; font-size: 20px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1.5px; line-height: 1.4;
        }

        /* --- ÁREA DO PROJETO --- */
        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-bottom: 2vh;
            border: 2px solid #1f2937;
            line-height: 0;
        }

        .imagem-base {
            max-width: 95vw; max-height: 70vh; 
            display: block; object-fit: contain;
        }

        .camada-full {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* --- BALÃO DE INFORMAÇÃO --- */
        #balao-info {
            position: absolute;
            background: #ffffff; color: #000000;
            padding: 12px 18px; border-radius: 12px;
            font-size: 14px; font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            z-index: 200; display: none;
            width: 240px; text-align: center; line-height: 1.4;
        }

        #balao-info::after {
            content: ""; position: absolute; top: 100%; left: 30px;
            border-width: 12px; border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }

        .norma-vermelha {
            display: block; color: #d00000;
            font-size: 11px; margin-top: 8px; font-weight: 900;
        }

        .ponto-clique {
            position: absolute; width: 1.8%; aspect-ratio: 1 / 1;
            border: 0.2vw solid #fff; border-radius: 50%;
            cursor: pointer; z-index: 100; transform: translate(-50%, -50%);
            display: none;
        }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .verde { background: #00ff00 !important; }
    </style>
</head>
<body>

    <div id="painel-status">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <!-- BALÃO COM PROPRIEDADES PARA SEU AJUSTE -->
        <div id="balao-info" style="top: 35%; left: 8%;">
            A fase pode ter qualquer cor
            <span class="norma-vermelha">(Item 6.1.5.3.4 da NBR-5410)</span>
        </div>

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const txtInstrucao = document.getElementById('instrucao');
        const balaoInfo = document.getElementById('balao-info');

        let etapaAtual = 0;
        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" } }
        ];

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) return;
            const config = etapas[etapaAtual];
            txtInstrucao.innerHTML = `ETAPA: ${config.nome}. CLIQUE NA ORIGEM INDICADA.`;
            pontoA.className = `ponto-clique ${config.cor}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        pontoA.onclick = (e) => {
            e.stopPropagation();
            pontoA.classList.add('verde');
            pontoB.style.display = "block";
            txtInstrucao.innerHTML = `PERCURSO EM ANDAMENTO... CLIQUE NO DESTINO.`;
        };

        pontoB.onclick = (e) => {
            e.stopPropagation();
            pontoB.classList.add('verde');
            const config = etapas[etapaAtual];
            let quadro = 0;
            const imgFio = document.createElement('img');
            imgFio.className = "camada-full";
            camadasFios.appendChild(imgFio);

            const anim = setInterval(() => {
                imgFio.src = `${config.pasta}/quadro${quadro.toString().padStart(4, '0')}.png`;
                if (quadro >= config.max) {
                    clearInterval(anim);
                    if(config.nome === "FASE 1") {
                        balaoInfo.style.display = "block";
                    }
                    pontoA.style.display = "none";
                    pontoB.style.display = "none";
                    etapaAtual++;
                    iniciarEtapa();
                } else { quadro++; }
            }, 40);
        };

        // Fecha o balão apenas ao clicar em qualquer lugar da tela
        window.addEventListener('click', () => {
            if (balaoInfo.style.display === "block") {
                balaoInfo.style.display = "none";
            }
        });

        iniciarEtapa();
    </script>
</body>
</html>
