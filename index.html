<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #060b13; color: #ffd700; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }

        /* --- CONTAINER DE CONTROLES (FORA DO PROJETO) --- */
        #interface-controles {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-controle {
            border: none; padding: 8px 30px; font-size: 15px; font-weight: 900; text-transform: uppercase; border-radius: 20px; cursor: pointer;
        }

        #btn-ajuda { background: #004f77; color: #00f0ff; border: 1px solid #00f0ff; }
        #btn-reiniciar { background: #b80000; color: #ffffff; }
        #btn-checklist { background: #ffcc00; color: #000; display: none; }
        #btn-teste { background: #00ff00; color: #000; display: none; }

        /* --- O RESTANTE DO SEU CSS --- */
        #projeto-container { 
            position: relative; display: inline-block; margin-top: 5vh; border: 2px solid #1f2937; box-shadow: 0 0 40px rgba(0,0,0,0.9); width: 100%; max-width: 1000px; 
        }
        .imagem-base { width: 100%; height: auto; display: block; border-radius: 8px; }
        /* [SUAS OUTRAS CLASSES MANTIDAS...] */
        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1 / 1; border: 0.2vw solid #fff; border-radius: 50%; cursor: pointer; z-index: 130; transform: translate(-50%, -50%); display: none; }
        
        /* [SUA ANIMAÇÃO E DEMAIS CLASSES] */
    </style>
</head>
<body>

    <div id="interface-controles">
        <button id="btn-ajuda" class="btn-controle" onclick="modalAjuda.style.display='flex'">AJUDA</button>
        <button id="btn-reiniciar" class="btn-controle" onclick="location.reload()">REINICIAR</button>
        <button id="btn-checklist" class="btn-controle" onclick="exibirChecklistFinal()">📋 VER CHECKLIST</button>
        <button id="btn-teste" class="btn-controle" onclick="realizarTesteFinal()">⚡ TESTAR CIRCUITO</button>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>
        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
        </div>

<script>
    // [SUA LÓGICA ORIGINAL AQUI]

    function verificarCircuito() {
        const dg = document.getElementById('tecla-dg').getAttribute('data-status');
        const dr = document.getElementById('tecla-dr').getAttribute('data-status');
        const int = document.getElementById('tecla-int').getAttribute('data-status');
        
        if (fiacaoConcluida) {
            painelDispositivos.style.display = "flex";
            // MOSTRA OS BOTÕES
            document.getElementById('btn-checklist').style.display = "block";
            document.getElementById('btn-teste').style.display = "block";
            
            // ... resto do seu código de status ...
        }
        // ... restante da sua função verificarCircuito ...
    }

    function realizarTesteFinal() {
        const dg = document.getElementById('tecla-dg').getAttribute('data-status');
        const dr = document.getElementById('tecla-dr').getAttribute('data-status');
        const int = document.getElementById('tecla-int').getAttribute('data-status');
        
        if(dg === 'on' && dr === 'on' && int === 'on') {
            alert("Teste do Circuito: STATUS OK! O circuito está energizado e funcionando.");
        } else {
            alert("Erro: O circuito não está energizado. Verifique se o DG, DR e Interruptor estão ligados!");
        }
    }
    
    // ... RESTO DO SEU SCRIPT ORIGINAL ...
</script>
</body>
</html>
