<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Garante que nada transborde da tela do PC */
        }

        /* --- PAINEL DE FORA A FORA (IGUAL À GRAVURA) --- */
        #painel-status {
            width: 100%; /* De fora a fora na tela */
            max-width: 1200px; /* Alinhado aos limites do laboratório */
            margin: 2vh auto; /* Margem calculada baseada na altura da tela */
            padding: 20px 40px;
            background: rgba(4, 10, 20, 0.9);
            border: 1px solid #16222f;
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        #instrucao {
            color: #ffd700;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.4;
        }

        .txt-laranja { color: #ff9d00; font-weight: bold; }
        .txt-verde { color: #00ff00; font-weight: bold; }
        .txt-vermelho { color: #ff3333; font-weight: bold; }

        /* --- ÁREA DO PROJETO AJUSTADA PARA CABER NA TELA --- */
        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-bottom: 2vh;
            border: 2px solid #1f2937;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            line-height: 0;
            max-height: 75vh; /* Limita a altura do circuito para não gerar scroll */
        }

        .imagem-base {
            max-width: 95vw;
            max-height: 75vh; /* Ajusta a imagem dinamicamente à altura do monitor */
            display: block;
            object-fit: contain;
        }

        .camada-full {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* --- COMPONENTES --- */
        .tecla-movel, .carga-movel, .acessorio-movel {
            position: absolute;
            z-index: 20; 
            user-select: none;
            -webkit-user-drag: none;
        }

        .tecla-movel { cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.5%; left: 75.5%; width: 6.5%; z-index: 30; }

        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; display: none; z-index: 15; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; display: none; z-index: 16; transform: rotate(90deg); }

        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }

        /* --- PONTOS DE CLIQUE --- */
        .ponto-clique {
            position: absolute;
            width: 1.8%; aspect-ratio: 1 / 1;
            border: 0.2vw solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
        }

        .ponto-fase { background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 1vw #ff0000; }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); box-shadow: 0 0 1vw #0096ff; }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); box-shadow: 0 0 1vw #ffa500; }
        .ponto-clique.verde { background: #00ff00 !important; box-shadow: 0 0 1.5vw #00ff00 !important; }
    </style>
</head>
<body>

    <div id="painel-status">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const conectorN2 = document.getElementById('conector-neutro');
        const conectorN3 = document.getElementById('conector-neutro-3vias');
        const txtInstrucao = document.getElementById('instrucao');

        // BANCO DE FRASES ALEATÓRIAS EM CAIXA ALTA (UPPERCASE) CONFORME O PADRÃO DA FOTO
        const msgsSaida = [
            "CLIQUE NA REFERÊNCIA DO <span class='txt-laranja'>PONTO DE SAÍDA</span> DO CABO ATUAL.",
            "INICIE A CONEXÃO CLICANDO NO <span class='txt-laranja'>BORNE DE ORIGEM</span> DESTACADO.",
            "TOQUE NO PONTO INDICADO PARA <span class='txt-laranja'>INICIAR A PASSAGEM</span> DO CONDUTOR."
        ];

        const msgsDestino = [
            "AGORA SELECIONE A REFERÊNCIA DO <span class='txt-verde'>PONTO DE DESTINO</span>.",
            "LEVE O CABO CONECTADO ATÉ O <span class='txt-verde'>BORNE DE CHEGADA</span>.",
            "CLIQUE NO PONTO ILUMINADO PARA <span class='txt-verde'>FINALIZAR O PERCURSO</span>."
        ];

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "55.5%" } },
            { nome: "NEUTRO 2", pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76%", left: "49%" }, posB: { top: "31%", left: "54%" } },
            { nome: "FASE 3", pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" } },
            { nome: "NEUTRO 3", pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54%" }, posB: { top: "23%", left: "91%" } },
            { nome: "RETORNO 2", pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "14%", left: "57%" }, posB: { top: "25%", left: "89%" } },
            { nome: "RETORNO 3", pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" } },
            { nome: "NEUTRO 4", pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" } }
        ];

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            if (fiacaoConcluida && dg === 'on' && dr === 'on' && int === 'on') {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                txtInstrucao.innerHTML = "<span class='txt-verde'>CIRCUITO ENERGIZADO: AS LÂMPADAS ESTÃO ACESAS!</span>";
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if(fiacaoConcluida) {
                    txtInstrucao.innerHTML = "FIAÇÃO OK! <span class='txt-vermelho'>LIGUE O DG, DR E INTERRUPTOR PARA TESTAR.</span>";
                }
            }
        }

        function alternarTecla(id, prefixo) {
            const el = document.getElementById(id);
            el.onclick = (e) => {
                e.stopPropagation();
                const status = el.getAttribute('data-status');
                const novoStatus = status === 'off' ? 'on' : 'off';
                el.src = `${prefixo}_${novoStatus}.png`;
                el.setAttribute('data-status', novoStatus);
                verificarCircuito();
            };
        }

        alternarTecla('tecla-dg', 'al_dg');
        alternarTecla('tecla-dr', 'al_dr');
        alternarTecla('tecla-int', 'tec_int');

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) {
                fiacaoConcluida = true;
                verificarCircuito();
                return;
            }
            const config = etapas[etapaAtual];
            
            // Define o texto misturando o nome da etapa com uma instrução de saída aleatória
            const fraseAleatoria = msgsSaida[Math.floor(Math.random() * msgsSaida.length)];
            txtInstrucao.innerHTML = `${config.nome} DETECTADO! ${fraseAleatoria}`;

            pontoA.className = `ponto-clique ${config.cor}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";

            pontoB.className = `ponto-clique ${config.cor}`;
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        function animarPassagemCabo(config, callback) {
            let quadroAtual = 0;
            const imgFio = document.createElement('img');
            imgFio.className = "camada-full";
            camadasFios.appendChild(imgFio);

            const timer = setInterval(() => {
                imgFio.src = `${config.pasta}/quadro${quadroAtual.toString().padStart(4, '0')}.png`;
                if (quadroAtual >= config.max) {
                    clearInterval(timer);
                    if(config.nome === "NEUTRO 1") conectorN2.style.display = "block";
                    if(config.nome === "NEUTRO 2") conectorN3.style.display = "block";
                    if (callback) callback();
                }
                quadroAtual++;
            }, 40); 
        }

        pontoA.onclick = (e) => {
            e.stopPropagation();
            pontoA.classList.add('verde');
            
            const fraseAleatoria = msgsDestino[Math.floor(Math.random() * msgsDestino.length)];
            txtInstrucao.innerHTML = `${etapas[etapaAtual].nome} EM CURSO: ${fraseAleatoria}`;
            pontoB.style.display = "block";
        };

        pontoB.onclick = (e) => {
            e.stopPropagation();
            pontoB.classList.add('verde');
            animarPassagemCabo(etapas[etapaAtual], () => {
                setTimeout(() => {
                    pontoA.style.display = "none";
                    pontoB.style.display = "none";
                    pontoA.classList.remove('verde');
                    pontoB.classList.remove('verde');
                    etapaAtual++;
                    iniciarEtapa();
                }, 600);
            });
        };

        iniciarEtapa();
    </script>
</body>
</html>
