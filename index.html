<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MODAL CHECKLIST AUTOMÁTICO --- */
        #modal-checklist {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(6, 11, 19, 0.98);
            border: 3px solid #ffd700;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            color: #FFFFFF;
            padding: 25px;
            z-index: 2000;
            width: 450px;
            border-radius: 15px;
            display: none; /* Inicia oculto */
            flex-direction: column;
            cursor: pointer; /* Indica que pode clicar para sair após o fim */
        }

        #modal-checklist h2 {
            color: #ffd700;
            text-align: center;
            margin-top: 0;
            font-size: 20px;
            text-transform: uppercase;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .item-check {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border-left: 4px solid #222;
            color: #555; /* Apagado */
            transition: all 0.4s ease;
        }

        .item-check.ativo {
            color: #fff;
            border-left-color: #00f0ff;
            background: rgba(0, 240, 255, 0.05);
        }

        .simbolo-v {
            color: #00ff00;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s ease;
        }

        .item-check.ativo .simbolo-v {
            opacity: 1;
            transform: scale(1.2);
        }

        /* PLACA FINALIZADA */
        #placa-concluido {
            display: none;
            background-color: #ffd700; /* Yellow Gold */
            color: #000;
            padding: 20px;
            text-align: center;
            font-weight: 900;
            font-size: 18px;
            border-radius: 8px;
            margin-top: 15px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* LAYOUT BASE */
        .imagem-base { max-width: 90vw; max-height: 70vh; margin-top: 20px; border-radius: 10px; }
        .btn-teste { margin-top: 20px; padding: 10px 30px; background: #00f0ff; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div style="text-align: center;">
            <button class="btn-teste" onclick="checkAutomatico()">Simular Último Fio (Teste)</button>
        </div>
    </div>

    <div id="modal-checklist">
        <h2>⚡ Inspeção NBR 5410</h2>
        
        <div class="item-check"><span>Seccionamento da Fase</span> <span class="simbolo-v">✔</span></div>
        <div class="item-check"><span>Identificação do Neutro</span> <span class="simbolo-v">✔</span></div>
        <div class="item-check"><span>Conectores de Emenda</span> <span class="simbolo-v">✔</span></div>
        <div class="item-check"><span>Dimensionamento 1,5mm²</span> <span class="simbolo-v">✔</span></div>
        <div class="item-check"><span>Segurança e Isolamento</span> <span class="simbolo-v">✔</span></div>

        <div id="placa-concluido">
            INSTALAÇÃO FINALIZADA.<br>TESTE SEU CIRCUITO.
        </div>
    </div>

    <script>
        let prontoParaSair = false;

        function checkAutomatico() {
            const modal = document.getElementById('modal-checklist');
            const itens = document.querySelectorAll('.item-check');
            const placa = document.getElementById('placa-concluido');
            
            // Inicialização
            prontoParaSair = false;
            modal.style.display = 'flex';
            placa.style.display = 'none';
            itens.forEach(i => i.classList.remove('ativo'));

            // Execução "Um a Um"
            itens.forEach((item, index) => {
                setTimeout(() => {
                    item.classList.add('ativo');

                    // Quando chegar no último
                    if (index === itens.length - 1) {
                        setTimeout(() => {
                            placa.style.display = 'block';
                            // Libera o fechamento após a placa aparecer
                            setTimeout(() => { prontoParaSair = true; }, 500);
                        }, 800);
                    }
                }, index * 1000); // 1 segundo de intervalo
            });
        }

        // Sai no primeiro clique do mouse após o fim
        document.addEventListener('mousedown', () => {
            if (prontoParaSair) {
                document.getElementById('modal-checklist').style.display = 'none';
                prontoParaSair = false;
            }
        });
    </script>
</body>
</html>
