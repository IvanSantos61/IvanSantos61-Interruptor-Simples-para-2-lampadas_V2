<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Simulador de Conexões</title>
    <style>
        /* Estilos Base mantidos */
        #projeto-container {
            position: relative;
            width: 800px;
            height: 600px;
            background: #1a1a1a;
            overflow: hidden;
            margin: 0 auto;
        }

        .camada-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Classe unificada para os balões de informação conforme NBR 5410 */
        .balao-estilo {
            position: absolute;
            background: #ffffff;
            color: #000000;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            z-index: 200;
            display: none; /* Inicia oculto */
            width: 240px;
            text-align: center;
            line-height: 1.4;
            pointer-events: auto;
            cursor: pointer;
        }

        .balao-estilo::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 30px;
            border-width: 12px;
            border-style: solid;
            border-color: #ffffff transparent transparent transparent;
        }

        .norma-vermelha {
            display: block;
            color: #d32f2f;
            font-size: 11px;
            margin-top: 5px;
        }

        #btn-reiniciar {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #ffd700;
            border: none;
            cursor: pointer;
            font-weight: bold;
            z-index: 300;
        }
    </style>
</head>
<body>

<div id="projeto-container">
    <!-- Camadas de Imagem -->
    <div id="camadas-fios"></div>

    <!-- Balão 01: Cor da Fase -->
    <div id="balao-info" class="balao-estilo" style="top: 65%; left: 32%;">
        A fase pode ter qualquer cor
        <span class="norma-vermelha">(Item 6.1.5.3.4 da NBR-5410)</span>
    </div>

    <!-- Balão 02: Seção Mínima -->
    <div id="balao-secao" class="balao-estilo" style="top: 15%; left: 45%;">
        A seção mínima do fio de iluminação é 1,5mm²
        <span class="norma-vermelha">(Item 6.2.6.1.1 da NBR-5410)</span>
    </div>

    <button id="btn-reiniciar">REINICIAR</button>
</div>

<script>
    const camadasFios = document.getElementById('camadas-fios');
    const balaoInfo = document.getElementById('balao-info');
    const balaoSecao = document.getElementById('balao-secao');
    const btnReiniciar = document.getElementById('btn-reiniciar');

    // Simulação de configurações de cabos
    const configs = [
        { nome: "FASE 1", pasta: "fase1", max: 25 },
        { nome: "NEUTRO 1", pasta: "neutro1", max: 25 }
    ];

    function animarPassagemCabo(config, callback) {
        let quadroAtual = 0;
        const imgFio = document.createElement('img');
        imgFio.className = "camada-full";
        camadasFios.appendChild(imgFio);

        const timer = setInterval(() => {
            // Caminho das imagens conforme estrutura do SMT Pro
            imgFio.src = `${config.pasta}/quadro${quadroAtual.toString().padStart(4, '0')}.png`;

            if (quadroAtual >= config.max) {
                clearInterval(timer);
                
                // Disparo simultâneo dos balões técnicos após a Fase 1
                if(config.nome === "FASE 1") {
                    balaoInfo.style.display = "block";
                    balaoSecao.style.display = "block";
                }

                if (callback) callback();
            } else { 
                quadroAtual++; 
            }
        }, 40); 
    }

    // Fechamento de ambos os balões em qualquer clique na tela
    window.onclick = (e) => {
        if (balaoInfo.style.display === "block" || balaoSecao.style.display === "block") {
            balaoInfo.style.display = "none";
            balaoSecao.style.display = "none";
        }
    };

    // Reiniciar Simulador
    btnReiniciar.onclick = (e) => {
        e.stopPropagation(); // Evita o fechamento imediato se estivessem abertos
        camadasFios.innerHTML = "";
        balaoInfo.style.display = "none";
        balaoSecao.style.display = "none";
        iniciarSimulacao();
    };

    function iniciarSimulacao() {
        animarPassagemCabo(configs[0], () => {
            console.log("Fase 1 concluída.");
            // Você pode encadear a próxima animação aqui
        });
    }

    // Início automático para teste
    iniciarSimulacao();
</script>

</body>
</html>
