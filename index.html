<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Escala Real - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            background-color: #050505;
            color: #ffd700;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
            height: 100vh;
        }

        h2 { margin: 10px 0; text-transform: uppercase; font-size: 1.2rem; }

        /* Container que mantém a proporção 16:9 */
        #projeto-container {
            position: relative;
            width: 95vw;
            max-width: 1920px;
            aspect-ratio: 1920 / 1080;
            background-color: #000;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Todas as imagens (fundo e fios) devem ocupar 100% do container */
        .camada-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garante que a proporção 1920x1080 seja respeitada */
        }

        #ambiente-img { z-index: 1; }
        .fio-camada { z-index: 10; pointer-events: none; }

        /* Pontos de Interação */
        .ponto-clique {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #fff;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.6);
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ponto-clique.verde {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
            border-color: #fff;
        }

        .hidden { display: none; }

        #mensagem-instrucao {
            margin-top: 15px;
            padding: 10px 20px;
            background: #111;
            border-radius: 4px;
            border-bottom: 2px solid #ffd700;
        }
    </style>
</head>
<body>

    <h2>Simulador de Instalação: FASE 1</h2>

    <div id="projeto-container">
        <!-- Imagem de Fundo (1920x1080) -->
        <img src="ambiente.jpg" id="ambiente-img" class="camada-full">

        <!-- Container onde o fio será injetado -->
        <div id="fio-fase1-container"></div>

        <!-- Pontos de Saída e Chegada (Ajuste as coordenadas 'top' e 'left' conforme sua imagem) -->
        <div id="btn-saida" class="ponto-clique" style="top: 30%; left: 20%;"></div>
        <div id="btn-chegada" class="ponto-clique hidden" style="top: 50%; left: 80%;"></div>
    </div>

    <div id="mensagem-instrucao">
        Clique no <strong>ponto vermelho</strong> para iniciar a passagem do cabo.
    </div>

    <script>
        const btnSaida = document.getElementById('btn-saida');
        const btnChegada = document.getElementById('btn-chegada');
        const msg = document.getElementById('mensagem-instrucao');
        const fioContainer = document.getElementById('fio-fase1-container');

        // Configurações do Projeto
        const CONFIG = {
            pasta: "FASE1",
            quadroFinal: "quadro0024.png" // Ajuste para o último frame da sua sequência
        };

        // 1. Ação ao clicar no Ponto de Saída
        btnSaida.addEventListener('click', function() {
            this.classList.add('verde');
            msg.innerHTML = "Saída conectada. Agora clique no <strong>ponto de chegada</strong>.";
            
            // Mostra o segundo ponto
            setTimeout(() => {
                btnChegada.classList.remove('hidden');
            }, 400);
        });

        // 2. Ação ao clicar no Ponto de Chegada
        btnChegada.addEventListener('click', function() {
            this.classList.add('verde');
            msg.innerHTML = "<span style='color: #00ff00;'>Fio FASE 1 instalado com sucesso!</span>";

            // Instala o fio em escala real
            completarFiacao();

            // Limpa os pontos após a conclusão
            setTimeout(() => {
                btnSaida.classList.add('hidden');
                btnChegada.classList.add('hidden');
            }, 1000);
        });

        function completarFiacao() {
            // Criamos a imagem do fio
            const imgFio = document.createElement('img');
            imgFio.src = `${CONFIG.pasta}/${CONFIG.quadroFinal}`;
            imgFio.className = "camada-full fio-camada"; // Mesma classe do fundo = Escala Perfeita
            
            fioContainer.appendChild(imgFio);
        }

        // Função auxiliar para você achar as coordenadas dos pontos (clique no console)
        document.getElementById('projeto-container').onclick = function(e) {
            if(e.target.classList.contains('ponto-clique')) return;
            const rect = this.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            console.log(`Coordenada para o botão -> top: ${y.toFixed(2)}%; left: ${x.toFixed(2)}%;`);
        };
    </script>
</body>
</html>
