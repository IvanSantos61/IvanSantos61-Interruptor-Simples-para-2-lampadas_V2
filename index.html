<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalação Ordenada - FioCerto</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            color: #ffd700;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        #cenario-container {
            position: relative;
            line-height: 0;
            border: 2px solid #333;
        }

        #ambiente-img {
            max-width: 90vw;
            max-height: 80vh;
            display: block;
        }

        /* Estilo dos pontos de conexão (âncoras) */
        .ponto {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            background: rgba(255, 0, 0, 0.5); /* Inicia avermelhado */
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
        }

        .ponto.ativo {
            background: #2ecc71; /* Verde ao clicar */
            border-color: #fff;
            box-shadow: 0 0 15px #2ecc71;
        }

        /* Ocultar elementos inicialmente */
        .hidden { display: none; }

        /* Fio FASE1 */
        #fio-fase1 {
            position: absolute;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="cenario-container">
        <img src="ambiente.jpg" id="ambiente-img">

        <!-- Pontos de Interação -->
        <div id="ponto-saida" class="ponto" style="top: 30%; left: 20%;"></div>
        <div id="ponto-chegada" class="ponto hidden" style="top: 30%; left: 60%;"></div>

        <!-- O Fio que será revelado -->
        <div id="fase1-container"></div>
    </div>

    <p id="instrucao" style="margin-top: 20px; font-weight: bold;">
        Clique no ponto de SAÍDA para iniciar a fiação.
    </p>

    <script>
        const pontoSaida = document.getElementById('ponto-saida');
        const pontoChegada = document.getElementById('ponto-chegada');
        const instrucao = document.getElementById('instrucao');
        const containerFio = document.getElementById('fase1-container');

        // Configuração da FASE1 (Ajuste aqui conforme os seus quadros)
        const totalQuadrosFase1 = 24; 
        const pastaFase1 = "FASE1";

        // 1. Clique na Saída
        pontoSaida.addEventListener('click', function() {
            this.classList.add('ativo');
            instrucao.innerText = "Excelente. Agora clique no ponto de CHEGADA.";
            
            // Revela o próximo ponto após um pequeno delay
            setTimeout(() => {
                pontoChegada.classList.remove('hidden');
            }, 300);
        });

        // 2. Clique na Chegada
        pontoChegada.addEventListener('click', function() {
            this.classList.add('ativo');
            instrucao.innerText = "Fio FASE1 instalado com sucesso!";

            // Renderiza o fio (usando o quadro final para representar o fio completo)
            renderizarFioCompleto();

            // Remove os pontos após a conclusão
            setTimeout(() => {
                pontoSaida.classList.add('hidden');
                pontoChegada.classList.add('hidden');
            }, 800);
        });

        function renderizarFioCompleto() {
            // Aqui carregamos o último quadro da sequência (fio passado por todo o trecho)
            // Ou podemos criar um loop para mostrar a animação de "correr o fio"
            const imgFio = document.createElement('img');
            imgFio.src = `${pastaFase1}/quadro0024.png`; // Mostra ele já passado
            imgFio.id = "fio-fase1";
            
            // O posicionamento do fio deve ser o mesmo que você encontrou nos testes anteriores
            imgFio.style.cssText = "top: 15%; left: 20%; width: 50%;"; 
            
            containerFio.appendChild(imgFio);
        }
    </script>
</body>
</html>
