<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador FioCerto - Componentes Master</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #050505;
            color: #ffd700;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-top: 10px;
            border: 2px solid #333;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            line-height: 0;
        }

        .imagem-base {
            max-width: 95vw;
            height: auto;
            display: block;
        }

        .camada-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* --- COMPONENTES MÓVEIS (TECLAS) --- */
        .tecla-movel {
            position: absolute;
            z-index: 20; /* Fica acima dos fios */
            cursor: pointer;
            transition: transform 0.1s;
        }

        /* IDs para você ajustar manualmente */
        #tecla-geral {
            top: 20%; 
            left: 10%; 
            width: 5%; /* Ajuste a largura conforme o tamanho do disjuntor na foto */
        }

        #tecla-dr {
            top: 20%; 
            left: 20%; 
            width: 8%; 
        }

        #tecla-interruptor {
            top: 50%; 
            left: 80%; 
            width: 4%; 
        }

        /* --- SISTEMA DE PONTOS --- */
        .ponto-clique {
            position: absolute;
            width: 1.8%; 
            aspect-ratio: 1 / 1;
            border: 0.2vw solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
            line-height: normal;
        }

        .ponto-fase { background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 1vw #ff0000; }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); box-shadow: 0 0 1vw #0096ff; }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); box-shadow: 0 0 1vw #ffa500; }

        .ponto-clique.verde {
            background: #00ff00 !important;
            box-shadow: 0 0 1.5vw #00ff00 !important;
        }

        #painel-status {
            margin-top: 15px;
            padding: 10px 20px;
            background: #111;
            border-radius: 5px;
            border-bottom: 3px solid #ffd700;
            text-align: center;
            z-index: 200;
        }
    </style>
</head>
<body>

    <div id="painel-status">
        <strong id="fio-atual">POSICIONAMENTO DE COMPONENTES</strong><br>
        <span id="instrucao">Ajuste a posição das teclas no CSS.</span>
    </div>

    <div id="projeto-container">
        <!-- Cenário -->
        <img src="ambiente.jpg" class="imagem-base">
        
        <!-- Camadas de Fios -->
        <div id="camadas-fios"></div>

        <!-- Componentes Móveis (Padrão OFF) -->
        <img src="geral_off.png" id="tecla-geral" class="tecla-movel">
        <img src="dr_off.png" id="tecla-dr" class="tecla-movel">
        <img src="inter_off.png" id="tecla-interruptor" class="tecla-movel">

        <!-- Pontos de Conexão -->
        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const txtFio = document.getElementById('fio-atual');
        const txtInstrucao = document.getElementById('instrucao');

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "55.5%" } },
            { nome: "NEUTRO 2", pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76%", left: "49%" }, posB: { top: "31%", left: "54%" } },
            { nome: "FASE 3", pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" } },
            { nome: "NEUTRO 3", pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54%" }, posB: { top: "23%", left: "91%" } },
            { nome: "RETORNO 2", pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "14%", left: "57%" }, posB: { top: "25%", left: "89%" } },
            { nome: "RETORNO 3", pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" } },
            { nome: "NEUTRO 4", pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" } }
        ];

        let etapaAtual = 0;

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) return;
            const config = etapas[etapaAtual];
            txtFio.innerText = `INSTALANDO: ${config.nome}`;
            txtInstrucao.innerText = `Toque no ponto de SAÍDA do cabo.`;

            pontoA.className = `ponto-clique ${config.cor}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";

            pontoB.className = `ponto-clique ${config.cor}`;
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        function animarPassagemCabo(config, callback) {
            let quadroAtual = 0;
            const imgFio = document.createElement('img');
            imgFio.className = "camada-full fio-camada";
            camadasFios.appendChild(imgFio);

            const timer = setInterval(() => {
                const num = quadroAtual.toString().padStart(4, '0');
                imgFio.src = `${config.pasta}/quadro${num}.png`;
                if (quadroAtual >= config.max) {
                    clearInterval(timer);
                    if (callback) callback();
                }
                quadroAtual++;
            }, 40); 
        }

        pontoA.addEventListener('click', (e) => {
            e.stopPropagation();
            pontoA.classList.add('verde');
            txtInstrucao.innerText = "Toque no ponto de DESTINO.";
            pontoB.style.display = "block";
        });

        pontoB.addEventListener('click', (e) => {
            e.stopPropagation();
            pontoB.classList.add('verde');
            animarPassagemCabo(etapas[etapaAtual], () => {
                setTimeout(() => {
                    pontoA.style.display = "none";
                    pontoB.style.display = "none";
                    pontoA.classList.remove('verde');
                    pontoB.classList.remove('verde');
                    etapaAtual++;
                    if (etapaAtual < etapas.length) iniciarEtapa();
                    else {
                        txtFio.innerHTML = "✓ FIAÇÃO PRONTA";
                        txtInstrucao.innerText = "Agora você pode testar os componentes.";
                    }
                }, 600);
            });
        });

        // Coletor para te ajudar no posicionamento das teclas
        document.getElementById('projeto-container').onclick = function(e) {
            const rect = this.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            console.log(`Posição para o CSS -> top: "${y.toFixed(2)}%", left: "${x.toFixed(2)}%"`);
        };

        iniciarEtapa();
    </script>
</body>
</html>
