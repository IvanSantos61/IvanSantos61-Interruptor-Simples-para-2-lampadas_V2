<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMT Pro - Simulador de Fiação</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #canvas-container {
            position: relative;
            width: 800px;
            height: 500px;
            background: #1a1a1a;
            border: 2px solid #333;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Identidade Visual FioCerto */
        .header {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .brand {
            color: #FFD700; /* Yellow Gold */
            font-weight: bold;
            font-size: 24px;
            letter-spacing: 2px;
        }

        .status-bar {
            background: #222;
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid #FFD700;
            font-size: 14px;
        }

        /* MODAL CHECKLIST - ESTILO DARK/NEON */
        #modal-checklist {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #121212;
            border: 3px solid #FFD700; /* Yellow Gold */
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            color: #FFFFFF;
            padding: 25px;
            z-index: 1000;
            width: 400px;
            border-radius: 12px;
            display: none; /* Inicia oculto */
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -45%); }
            to { opacity: 1; transform: translate(-50%, -50%); }
        }

        #modal-checklist h2 {
            color: #FFD700;
            text-align: center;
            margin-top: 0;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #333;
            padding-bottom: 15px;
        }

        .item-check {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            padding: 12px;
            background: #1e1e1e;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .item-check:hover {
            background: #252525;
        }

        .item-check input[type="checkbox"] {
            margin-right: 15px;
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #FF0000; /* Neon Red */
        }

        .item-check label {
            cursor: pointer;
            font-size: 14px;
            line-height: 1.4;
        }

        .btn-finalizar {
            background-color: #FF0000; /* Neon Red */
            color: #fff;
            border: none;
            padding: 15px;
            width: 100%;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            border-radius: 4px;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .btn-finalizar:hover {
            background-color: #cc0000;
            box-shadow: 0 0 15px #FF0000;
        }

        /* Simulação de fio para o teste */
        .placeholder-fio {
            position: absolute;
            background: #FF0000;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
            bottom: 20px;
            left: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">FioCerto <span style="color:#fff; font-size: 12px;">SMT PRO</span></div>
        <div class="status-bar">Conexões: <span id="contador">0</span> / 5</div>
    </div>

    <div id="canvas-container">
        <!-- Simulação do quadro elétrico -->
        <div style="text-align: center; padding-top: 150px; color: #444;">
            <h3>ÁREA DE SIMULAÇÃO</h3>
            <p>Clique no botão abaixo para simular a conexão do "último fio"</p>
        </div>

        <div class="placeholder-fio" onclick="simularConexao()">
            CONECTAR FIO
        </div>

        <!-- MODAL DE CHECKLIST -->
        <div id="modal-checklist">
            <h2>⚡ Inspeção Final</h2>
            <div id="lista-inspecao">
                <div class="item-check">
                    <input type="checkbox" id="chk1">
                    <label for="chk1"><strong>Entrada:</strong> Fases no Geral e Neutro no barramento.</label>
                </div>
                <div class="item-check">
                    <input type="checkbox" id="chk2">
                    <label for="chk2"><strong>Proteção:</strong> DPS instalado em paralelo e aterrado.</label>
                </div>
                <div class="item-check">
                    <input type="checkbox" id="chk3">
                    <label for="chk3"><strong>Segurança:</strong> DR monitorando circuitos terminais.</label>
                </div>
                <div class="item-check">
                    <input type="checkbox" id="chk4">
                    <label for="chk4"><strong>Padrão NBR:</strong> Cores Azul (N) e Verde (PE) corretas.</label>
                </div>
                <div class="item-check">
                    <input type="checkbox" id="chk5">
                    <label for="chk5"><strong>Acabamento:</strong> Bornes apertados, sem cobre exposto.</label>
                </div>
            </div>
            <button class="btn-finalizar" onclick="concluirTeste()">EMITIR RELATÓRIO DE CONFORMIDADE</button>
        </div>
    </div>

    <script>
        let fiosConectados = 0;
        const TOTAL_FIOS = 5; // Para o teste rápido

        function simularConexao() {
            if (fiosConectados < TOTAL_FIOS) {
                fiosConectados++;
                document.getElementById('contador').innerText = fiosConectados;
                
                if (fiosConectados === TOTAL_FIOS) {
                    // Gatilho: Ao finalizar o último fio
                    dispararChecklist();
                }
            }
        }

        function dispararChecklist() {
            // Delay para percepção visual do encerramento
            setTimeout(() => {
                const modal = document.getElementById('modal-checklist');
                modal.style.display = 'block';
                console.log("SMT Pro: Último fio detectado. Checklist ativado.");
            }, 800);
        }

        function concluirTeste() {
            // Verifica se todos foram marcados (opcional, mas profissional)
            const checks = document.querySelectorAll('#lista-inspecao input[type="checkbox"]');
            const todosMarcados = Array.from(checks).every(c => c.checked);
            
            if (!todosMarcados) {
                alert("Por favor, revise todos os itens de segurança antes de emitir o relatório.");
                return;
            }

            alert("RELATÓRIO GERADO!
Sistema em conformidade com a NBR 5410.");
            document.getElementById('modal-checklist').style.display = 'none';
            // Aqui entraria a lógica de salvar no Firebase ou resetar
        }
    </script>
</body>
</html>
