<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #060b13;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%;
            max-width: 900px;
            height: 70%;
            max-height: 450px;
            border: 3px solid #00f0ff;
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .intro-entrada {
            color: #008b8b;
            font-size: 55px;
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(0, 139, 139, 0.5);
            margin: 0 0 10px 0;
        }

        .titulo-entrada {
            color: #00f0ff;
            font-size: 38px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            margin: 0 0 25px 0;
        }

        .subtitulo-entrada {
            color: #00f0ff;
            font-size: 24px;
            font-weight: 450;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0 0 40px 0;
        }

        .creditos-entrada {
            color: #445566;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .btn-iniciar-lab {
            background: transparent;
            border: 2px solid #00f0ff;
            border-radius: 50px;
            color: #00f0ff;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 12px 35px;
            cursor: pointer;
            letter-spacing: 1px;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
            transition: all 0.3s ease;
            animation: pulsarBotao 1.5s infinite;
        }

        @keyframes pulsarBotao {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        }

        /* --- BALÕES INFORMATIVOS --- */
        .balao-informativo {
            position: absolute;
            background: rgba(4, 10, 20, 0.95);
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            z-index: 120;
            pointer-events: none;
            opacity: 0;
            display: none;
            transition: opacity 0.4s ease;
            line-height: 1.4;
        }

        #balao-retorno-cor { width: 220px; top: 40%; left: 44.3%; border: 2px solid #ffa500; box-shadow: 0 0 20px rgba(255, 165, 0, 0.3); }
        #balao-retorno-comum { width: 195px; top: 15%; left: 70%; border: 2px solid #ffa500; box-shadow: 0 0 20px rgba(255, 165, 0, 0.3); background: rgba(255, 0, 0, 0.95); }
        #balao-cores { width: 230px; top: 68%; left: 4.5%; border: 2px solid #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
        #balao-neutro-norma { width: 260px; top: 34%; left: 23%; border: 2px solid #0096ff; box-shadow: 0 0 20px rgba(0, 150, 255, 0.3); }
