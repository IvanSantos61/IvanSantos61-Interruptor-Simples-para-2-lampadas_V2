<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FioCerto - Simulador de Fiação</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #050505;
            color: #ffd700;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* CONTAINER DE MENSAGENS ESTILO SMT PRO */
        #container-instrucao {
            position: fixed;
            top: 15px;
            width: 90%;
            max-width: 550px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #444;
            border-bottom: 4px solid #ffd700;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .txt-fio { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 5px; }
        .txt-comando { color: #ff9d00; font-size: 14px; font-style: italic; min-height: 20px; }
        .status-pill {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid currentColor;
        }
        .pill-off { color: #ff3333; background: rgba(255, 51, 51, 0.1); }
        .pill-on { color: #00ff00; background: rgba(0, 255, 0, 0.1); }

        #projeto-container {
            position: relative;
            margin-top: 140px;
            line-height: 0;
        }

        .imagem-base { max-width: 95vw; height: auto; display: block; border: 1px solid #222; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* COMPONENTES */
        .tecla-movel { position: absolute; z-index: 30; cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.5%; left: 75.5%; width: 6.5%; }

        .carga-movel { position: absolute; z-index: 25; display: none; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }
        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; }

        /* PONTOS */
        .ponto-clique {
            position: absolute; width: 2%; aspect-ratio: 1/1;
            border: 2px solid #fff; border-radius: 50%;
            cursor: pointer; z-index: 100; transform: translate(-50%, -50%);
            display: none; transition: 0.3s;
        }
        .fase { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .neutro { background: #0096ff; box-shadow: 0 0 10px #0096ff; }
        .retorno { background: #ffa500; box-shadow: 0 0 10px #ffa500; }
        .ponto-clique.ativo { background: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }
    </style>
</head>
<body>

    <div id="container-instrucao">
        <div class="txt-fio" id="display-fio">CARREGANDO...</div>
        <div class="txt-comando" id="display-msg">Aguarde o início do teste.</div>
        <div id="status-pilula" class="status-pill pill-off">CIRCUITO DESLIGADO</div>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        // LISTA DE MENSAGENS ALEATÓRIAS (AJUSTE COMO QUISER)
        const msgsSaida = [
            "Conecte o cabo no borne de saída indicado.",
            "Inicie a fiação clicando no ponto em destaque.",
            "Selecione a origem do condutor agora.",
            "Toque no borne para prender o fio de saída.",
            "Primeiro passo: clique no ponto de partida."
        ];

        const msgsDestino = [
            "Agora leve o condutor até o próximo borne.",
            "Passe o cabo pela tubulação até o destino.",
            "Finalize o percurso clicando no ponto de chegada.",
            "Conecte a outra extremidade no borne indicado.",
            "Encaminhe o fio até o ponto final."
        ];

        const etapas = [
            { nome: "FASE 1 (DG ao DR)", pasta: "FASE1", max: 24, cor: "fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1 (Barramento)", pasta: "NEUTRO1", max: 54, cor: "neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "FASE 2 (DR ao Disjuntor)", pasta: "FASE2", max: 24, cor: "fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "55.5%" } },
            { nome: "NEUTRO 2 (Conector)", pasta: "NEUTRO2", max: 24, cor: "neutro", posA: { top: "76%", left: "49%" }, posB: { top: "31%", left: "54%" } }
            // ... Adicione as outras etapas aqui seguindo o mesmo padrão
        ];

        let etapaAtual = 0;
        let concluido = false;

        function atualizarDisplay() {
            const dg = document.getElementById('tecla-dg').dataset.status === 'on';
            const dr = document.getElementById('tecla-dr').dataset.status === 'on';
            const int = document.getElementById('tecla-int').dataset.status === 'on';
            const pilula = document.getElementById('status-pilula');

            if (concluido && dg && dr && int) {
                document.getElementById('lampada1').style.display = 'block';
                document.getElementById('lampada2').style.display = 'block';
                pilula.innerText = "LÂMPADAS ACESAS";
                pilula.className = "status-pill pill-on";
            } else {
                document.getElementById('lampada1').style.display = 'none';
                document.getElementById('lampada2').style.display = 'none';
                pilula.innerText = "CIRCUITO DESLIGADO";
                pilula.className = "status-pill pill-off";
            }
        }

        function iniciarPasso() {
            if (etapaAtual >= etapas.length) {
                concluido = true;
                document.getElementById('display-fio').innerText = "✓ SISTEMA PRONTO";
                document.getElementById('display-msg').innerText = "Fiação finalizada com sucesso! Teste os dispositivos.";
                atualizarDisplay();
                return;
            }

            const e = etapas[etapaAtual];
            document.getElementById('display-fio').innerText = `INSTALANDO: ${e.nome}`;
            // Escolhe mensagem aleatória de saída
            document.getElementById('display-msg').innerText = msgsSaida[Math.floor(Math.random() * msgsSaida.length)];

            const pA = document.getElementById('ponto-A');
            const pB = document.getElementById('ponto-B');

            pA.className = `ponto-clique ${e.cor}`;
            pA.style.top = e.posA.top; pA.style.left = e.posA.left;
            pA.style.display = 'block';

            pB.className = `ponto-clique ${e.cor}`;
            pB.style.top = e.posB.top; pB.style.left = e.posB.left;
            pB.style.display = 'none';

            pA.onclick = () => {
                pA.classList.add('ativo');
                // Escolhe mensagem aleatória de destino
                document.getElementById('display-msg').innerText = msgsDestino[Math.floor(Math.random() * msgsDestino.length)];
                pB.style.display = 'block';
            };

            pB.onclick = () => {
                pB.classList.add('ativo');
                animar(e, () => {
                    etapaAtual++;
                    pA.style.display = pB.style.display = 'none';
                    pA.classList.remove('ativo'); pB.classList.remove('ativo');
                    iniciarPasso();
                });
            };
        }

        function animar(conf, callback) {
            let q = 0;
            const img = document.createElement('img');
            img.className = "camada-full";
            document.getElementById('camadas-fios').appendChild(img);
            const t = setInterval(() => {
                img.src = `${conf.pasta}/quadro${q.toString().padStart(4, '0')}.png`;
                if (q >= conf.max) { clearInterval(t); callback(); }
                q++;
            }, 40);
        }

        function setupBotoes(id, prefix) {
            const btn = document.getElementById(id);
            btn.onclick = () => {
                const s = btn.dataset.status === 'off' ? 'on' : 'off';
                btn.src = `${prefix}_${s}.png`;
                btn.dataset.status = s;
                atualizarDisplay();
            };
        }

        setupBotoes('tecla-dg', 'al_dg');
        setupBotoes('tecla-dr', 'al_dr');
        setupBotoes('tecla-int', 'tec_int');

        iniciarPasso();
    </script>
</body>
</html>
