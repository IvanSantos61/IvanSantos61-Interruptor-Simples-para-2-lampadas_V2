<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        /* Estilização Base e Layout */
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13; /* Fundo escuro conforme padrão FioCerto */
            color: #ffd700; /* Destaque em Yellow Gold */
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE ENTRADA (SPLASH SCREEN) --- */
        #tela-entrada {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #060b13;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%;
            max-width: 900px;
            border: 3px solid #00f0ff; /* Ciano Neon */
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4);
            padding: 40px;
            text-align: center;
        }

        .titulo-entrada {
            color: #00f0ff;
            font-size: 48px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            margin: 0 0 10px 0;
        }

        /* --- IDENTIFICAÇÃO DO SISTEMA --- */
        #titulo-sistema {
            color: #00f0ff;
            font-size: 32px;
            font-weight: 900;
            margin: 2vh 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- PAINEL DE STATUS --- */
        #painel-status {
            width: 90%;
            max-width: 1100px;
            background: rgba(4, 10, 20, 0.9);
            border: 1px solid #16222f;
            border-radius: 12px;
            padding: 15px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2vh;
        }

        #instrucao {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-transform: uppercase;
        }

        .status-aceso { color: #00ff00; background: rgba(0, 100, 0, 0.3); padding: 10px 20px; border-radius: 8px; }
        .status-apagado { color: #ff3333; background: rgba(100, 0, 0, 0.3); padding: 10px 20px; border-radius: 8px; }

        /* --- ÁREA DO SIMULADOR --- */
        #projeto-container {
            position: relative;
            max-height: 65vh;
            border: 2px solid #1f2937;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        .imagem-base {
            max-height: 65vh;
            width: auto;
            display: block;
        }

        /* Camadas de Fios e Componentes */
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        .tecla-movel { position: absolute; cursor: pointer; z-index: 30; transition: transform 0.1s; }
        .tecla-movel:active { transform: scale(0.95); }

        /* Posicionamento dos Componentes */
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; }

        /* Lâmpadas (Overlay Neon) */
        .carga-movel {
            position: absolute;
            display: none;
            z-index: 25;
            filter: drop-shadow(0 0 20px #fff700);
            pointer-events: none;
        }
        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; }

        /* Pontos de Clique (Interação) */
        .ponto-clique {
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
        }
        .ponto-fase { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .ponto-neutro { background: #0096ff; box-shadow: 0 0 10px #0096ff; }
        .ponto-retorno { background: #ffa500; box-shadow: 0 0 10px #ffa500; }
        .ponto-clique.verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00; }

        /* --- BOTÕES DE CONTROLE --- */
        .controles-inferiores {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-acao {
            padding: 10px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }
        #btn-ajuda { background: #004f77; color: #00f0ff; }
        #btn-reiniciar { background: #b80000; color: #fff; }

        /* --- PLACA DE CONCLUÍDO --- */
        #placa-concluido {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; padding: 30px;
            background: linear-gradient(135deg, #2c3540, #182026);
            border: 2px solid #00ff00;
            border-radius: 10px;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 200;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="tela-entrada">
        <div class="moldura-entrada">
            <h1 class="titulo-entrada">Laboratório SMT Pro</h1>
            <h2 style="color: #ffd700; letter-spacing: 3px;">FioCerto - Engenharia Elétrica</h2>
            <p style="color: #445566; margin: 30px 0;">Simulador de Instalação: Interruptor Simples (2 Lâmpadas)</p>
            <button class="btn-acao" style="background:#00f0ff; color:#000; padding: 20px 40px;" onclick="iniciarLaboratorio()">INICIAR LABORATÓRIO</button>
        </div>
    </div>

    <div id="titulo-sistema">FioCerto - SMT Pro</div>

    <div id="painel-status">
        <span id="instrucao">AGUARDANDO INÍCIO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <!-- Componentes Interativos -->
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <!-- Pontos de Conexão -->
        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>

        <!-- Feedback de Conclusão -->
        <div id="placa-concluido">
            <h2 style="margin:0">✓ EXERCÍCIO</h2>
            <h1 style="margin:0">CONCLUÍDO</h1>
        </div>

        <div class="controles-inferiores">
            <button id="btn-ajuda" class="btn-acao">Esquema Técnico</button>
            <button id="btn-reiniciar" class="btn-acao">Reiniciar</button>
        </div>
    </div>

    <script>
        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" }, msg: "Clique no DR para iniciar a passagem da FASE." },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76.5%", left: "40%" }, msg: "Conecte o NEUTRO do barramento à caixa de passagem." },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "56%" }, msg: "Leve a FASE até a próxima caixa de derivação." },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" }, msg: "Instale o RETORNO do interruptor para a carga." }
            // Adicione as demais etapas conforme necessário
        ];

        let etapaAtual = 0;
        let fiacaoPronta = false;

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.opacity = "0";
            setTimeout(() => { 
                document.getElementById('tela-entrada').style.visibility = "hidden";
                atualizarEtapa();
            }, 500);
        }

        function atualizarEtapa() {
            if (etapaAtual >= etapas.length) {
                fiacaoPronta = true;
                document.getElementById('instrucao').innerHTML = "FIAÇÃO CONCLUÍDA. TESTE OS DISJUNTORES!";
                return;
            }

            const config = etapas[etapaAtual];
            const pA = document.getElementById('ponto-A');
            const pB = document.getElementById('ponto-B');

            document.getElementById('instrucao').innerText = config.msg;
            
            pA.className = `ponto-clique ${config.cor}`;
            pA.style.top = config.posA.top;
            pA.style.left = config.posA.left;
            pA.style.display = "block";

            pB.className = `ponto-clique ${config.cor}`;
            pB.style.top = config.posB.top;
            pB.style.left = config.posB.left;
            pB.style.display = "none";
        }

        document.getElementById('ponto-A').onclick = () => {
            document.getElementById('ponto-A').classList.add('verde');
            document.getElementById('ponto-B').style.display = "block";
        };

        document.getElementById('ponto-B').onclick = () => {
            document.getElementById('ponto-B').classList.add('verde');
            animarCabo();
        };

        function animarCabo() {
            const config = etapas[etapaAtual];
            const container = document.getElementById('camadas-fios');
            const img = document.createElement('img');
            img.className = "camada-full";
            container.appendChild(img);

            let frame = 0;
            const anim = setInterval(() => {
                img.src = `${config.pasta}/quadro${frame.toString().padStart(4, '0')}.png`;
                if (frame >= config.max) {
                    clearInterval(anim);
                    etapaAtual++;
                    document.getElementById('ponto-A').classList.remove('verde');
                    document.getElementById('ponto-B').classList.remove('verde');
                    atualizarEtapa();
                }
                frame++;
            }, 40);
        }

        // Lógica de acionamento elétrico
        function setupTeclas(id, prefix) {
            const el = document.getElementById(id);
            el.onclick = () => {
                const status = el.getAttribute('data-status') === 'off' ? 'on' : 'off';
                el.src = `${prefix}_${status}.png`;
                el.setAttribute('data-status', status);
                verificarEnergia();
            };
        }

        setupTeclas('tecla-dg', 'al_dg');
        setupTeclas('tecla-dr', 'al_dr');
        setupTeclas('tecla-int', 'tec_int');

        function verificarEnergia() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status') === 'on';
            const dr = document.getElementById('tecla-dr').getAttribute('data-status') === 'on';
            const int = document.getElementById('tecla-int').getAttribute('data-status') === 'on';

            if (fiacaoPronta && dg && dr && int) {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                document.getElementById('instrucao').innerHTML = "<span class='status-aceso'>SISTEMA ENERGIZADO - OK</span>";
                setTimeout(() => { document.getElementById('placa-concluido').style.display = "flex"; }, 1500);
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if (fiacaoPronta) document.getElementById('instrucao').innerHTML = "<span class='status-apagado'>CIRCUITO DESLIGADO</span>";
            }
        }

        document.getElementById('btn-reiniciar').onclick = () => location.reload();
    </script>
</body>
</html>
