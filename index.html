<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #060b13;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%; max-width: 900px; height: 70%; max-height: 450px;
            border: 3px solid #00f0ff; border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }

        .titulo-entrada { color: #00f0ff; font-size: 38px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin-bottom: 25px; }

        .btn-iniciar-lab {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase;
            padding: 12px 35px; cursor: pointer; animation: pulsarBotao 1.5s infinite;
        }

        @keyframes pulsarBotao {
            0% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
            50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); }
            100% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); }
        }

        /* --- INTERFACE PRINCIPAL --- */
        #titulo-sistema {
            color: #00f0ff; font-size: 40px; font-weight: 400; letter-spacing: 2px;
            margin-top: 2.5vh; margin-bottom: 1vh; text-align: center;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8); text-transform: uppercase;
        }

        #painel-instrucao {
            width: 100%; max-width: 1000px; margin: 1vh auto; padding: 20px;
            background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px;
            text-align: center; min-height: 80px; display: flex; align-items: center; justify-content: center;
        }

        #instrucao { font-size: 18px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #ffd700; }
        .tag-circuito { color: #ff3333; }
        .tag-rede { color: #00ff00; }

        /* --- NOVO QUADRO DE STATUS (PADRÃO SOLICITADO) --- */
        #quadro-status-v2 {
            position: absolute;
            top: 40%;
            left: 65%;
            width: 180px;
            background: rgba(0, 10, 20, 0.95);
            border: 2px solid #00f0ff;
            border-radius: 10px;
            padding: 10px;
            z-index: 100;
            display: none; /* Só aparece no final */
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .titulo-status-v2 {
            font-size: 11px;
            color: #00f0ff;
            text-align: center;
            border-bottom: 1px solid #00f0ff;
            padding-bottom: 5px;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .linha-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #fff;
            font-size: 13px;
            font-weight: bold;
            padding: 4px 5px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2);
        }

        .linha-status:last-child { border-bottom: none; }
        .chk-icon { font-size: 14px; }
        .chk-ok { color: #00ff00; text-shadow: 0 0 5px #00ff00; }
        .chk-no { color: #ff0000; text-shadow: 0 0 5px #ff0000; }

        /* --- CONTAINER DO PROJETO --- */
        #projeto-container {
            position: relative; display: inline-block; margin-bottom: 2vh;
            border: 2px solid #1f2937;
        }

        .imagem-base { max-width: 95vw; max-height: 70vh; display: block; border-radius: 8px; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .tecla-movel { position: absolute; z-index: 20; cursor: pointer; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; z-index: 30; }

        #lampada1, #lampada2 { position: absolute; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); }
        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; }

        .btn-controle { position: absolute; border: none; padding: 8px 25px; font-weight: 900; text-transform: uppercase; border-radius: 15px; cursor: pointer; z-index: 110; color: #fff; }
        #btn-ajuda { top: 83%; left: 28%; background: #004f77; border: 1px solid #00f0ff; }
        #btn-reiniciar { top: 90%; left: 28%; background: #b80000; }

        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1/1; border-radius: 50%; border: 2px solid #fff; z-index: 100; cursor: pointer; display: none; transform: translate(-50%, -50%); }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); }
        .verde { background: #00ff00 !important; }

        #placa-concluido {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40%; background: #1a1a1a; border: 3px solid #00ff00; border-radius: 10px;
            z-index: 150; display: none; align-items: center; justify-content: center; padding: 20px;
            color: #00ff00; font-size: 30px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES - 2 LÂMPADAS</h1>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Iniciar Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    
    <div id="painel-instrucao">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <div id="quadro-status-v2">
            <div class="titulo-status-v2">STATUS DO CIRCUITO</div>
            <div class="linha-status"><span>DG</span> <span id="stat-dg" class="chk-no chk-icon">✘</span></div>
            <div class="linha-status"><span>DR</span> <span id="stat-dr" class="chk-no chk-icon">✘</span></div>
            <div class="linha-status"><span>INT</span> <span id="stat-int" class="chk-no chk-icon">✘</span></div>
        </div>

        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1">
        <img src="lamp_on.png" id="lampada2">

        <div id="placa-concluido">✓ CONCLUÍDO</div>

        <button id="btn-ajuda" class="btn-controle">AJUDA</button>
        <button id="btn-reiniciar" class="btn-controle">REINICIAR</button>

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const somDisjuntor = new Audio('disj.mp3');
        const somInterruptor = new Audio('int.mp3');
        const somConexao = new Audio('conexao.mp3');

        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const txtInstrucao = document.getElementById('instrucao');
        const quadroStatus = document.getElementById('quadro-status-v2');

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        const etapas = [
            { pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" }, msgA: "REDE: CLIQUE NO DR PARA INICIAR A FASE", msgB: "REDE: LEVE A FASE ATÉ A CAIXA DE PASSAGEM" },
            { pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76.5%", left: "40%" }, msgA: "REDE: CLIQUE NO BARRAMENTO PARA O NEUTRO", msgB: "REDE: LEVE O NEUTRO ATÉ A CAIXA" },
            { pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "56%" }, msgA: "REDE: LEVE A FASE ATÉ A PRÓXIMA CAIXA", msgB: "REDE: CLIQUE NA CAIXA DESTINO" },
            { pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76.8%", left: "49%" }, posB: { top: "31%", left: "54.5%" }, msgA: "REDE: LEVE O NEUTRO ATÉ A PRÓXIMA CAIXA", msgB: "REDE: CLIQUE NA CAIXA DESTINO" },
            { pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" }, msgA: "CIRCUITO: LEVE A FASE AO INTERRUPTOR", msgB: "CIRCUITO: CLIQUE NO INTERRUPTOR" },
            { pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" }, msgA: "CIRCUITO: LEVE O RETORNO PARA A CAIXA", msgB: "CIRCUITO: CLIQUE NO CONECTOR DE EMENDA" },
            { pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54.7%" }, posB: { top: "23%", left: "91%" }, msgA: "CIRCUITO: LEVE O NEUTRO À LÂMPADA 1", msgB: "CIRCUITO: CLIQUE NA LÂMPADA" },
            { pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "16%", left: "57%" }, posB: { top: "25%", left: "89%" }, msgA: "CIRCUITO: LEVE O RETORNO À LÂMPADA 1", msgB: "CIRCUITO: CLIQUE NA LÂMPADA" },
            { pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" }, msgA: "CIRCUITO: INTERLIGUE O RETORNO NA LÂMPADA 2", msgB: "CIRCUITO: CLIQUE NA LÂMPADA 2" },
            { pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" }, msgA: "CIRCUITO: INTERLIGUE O NEUTRO NA LÂMPADA 2", msgB: "CIRCUITO: CLIQUE NA LÂMPADA 2" }
        ];

        function formatarTexto(texto) {
            return texto.replace(/CIRCUITO:/g, '<span class="tag-circuito">CIRCUITO:</span>').replace(/REDE:/g, '<span class="tag-rede">REDE:</span>');
        }

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.display = "none";
            iniciarEtapa();
        }

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) { 
                fiacaoConcluida = true; 
                quadroStatus.style.display = "block";
                verificarCircuito(); 
                return; 
            }
            const c = etapas[etapaAtual];
            txtInstrucao.innerHTML = formatarTexto(c.msgA);
            pontoA.style.display = "block"; pontoA.className = "ponto-clique " + c.cor;
            pontoA.style.top = c.posA.top; pontoA.style.left = c.posA.left;
            pontoB.style.display = "none"; pontoB.className = "ponto-clique " + c.cor;
            pontoB.style.top = c.posB.top; pontoB.style.left = c.posB.left;
        }

        pontoA.onclick = () => { pontoA.classList.add('verde'); pontoB.style.display = "block"; txtInstrucao.innerHTML = formatarTexto(etapas[etapaAtual].msgB); };

        pontoB.onclick = () => {
            pontoB.classList.add('verde');
            const c = etapas[etapaAtual];
            const img = document.createElement('img');
            img.className = "camada-full";
            camadasFios.appendChild(img);
            let frame = 0;
            const t = setInterval(() => {
                img.src = c.pasta + "/quadro" + frame.toString().padStart(4, '0') + ".png";
                if (frame >= c.max) {
                    clearInterval(t);
                    somConexao.play();
                    etapaAtual++;
                    pontoA.classList.remove('verde'); pontoB.classList.remove('verde');
                    iniciarEtapa();
                } else frame++;
            }, 40);
        };

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            // Atualiza ícones do quadro de status
            document.getElementById('stat-dg').innerHTML = dg === 'on' ? '✔' : '✘';
            document.getElementById('stat-dg').className = dg === 'on' ? 'chk-ok chk-icon' : 'chk-no chk-icon';
            
            document.getElementById('stat-dr').innerHTML = dr === 'on' ? '✔' : '✘';
            document.getElementById('stat-dr').className = dr === 'on' ? 'chk-ok chk-icon' : 'chk-no chk-icon';

            document.getElementById('stat-int').innerHTML = int === 'on' ? '✔' : '✘';
            document.getElementById('stat-int').className = int === 'on' ? 'chk-ok chk-icon' : 'chk-no chk-icon';

            if (fiacaoConcluida) {
                if (dg === 'on' && dr === 'on' && int === 'on') {
                    document.getElementById('lampada1').style.display = "block";
                    document.getElementById('lampada2').style.display = "block";
                    txtInstrucao.innerHTML = "LÂMPADAS ACESAS!";
                } else {
                    document.getElementById('lampada1').style.display = "none";
                    document.getElementById('lampada2').style.display = "none";
                    txtInstrucao.innerHTML = "<span style='color:red'>FIAÇÃO CONCLUÍDA!</span> LIGUE OS DISPOSITIVOS PARA TESTAR.";
                }
            }
        }

        function configurarTecla(id, prefixo, som) {
            const el = document.getElementById(id);
            el.onclick = () => {
                const s = el.getAttribute('data-status') === 'off' ? 'on' : 'off';
                el.src = prefixo + "_" + s + ".png";
                el.setAttribute('data-status', s);
                som.currentTime = 0; som.play();
                verificarCircuito();
            };
        }

        configurarTecla('tecla-dg', 'al_dg', somDisjuntor);
        configurarTecla('tecla-dr', 'al_dr', somDisjuntor);
        configurarTecla('tecla-int', 'tec_int', somInterruptor);

        document.getElementById('btn-reiniciar').onclick = () => location.reload();
    </script>
</body>
</html>
