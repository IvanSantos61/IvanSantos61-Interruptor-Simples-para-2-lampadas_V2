<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        body { background-color: #060b13; color: #ffd700; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #projeto-container { position: relative; width: 1000px; height: 600px; background: #000; border: 2px solid #1f2937; margin-top: 20px; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* Balão NBR-5410 conforme sua solicitação */
        #balao-informativo {
            position: absolute;
            top: 40%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #ffd700;
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            display: none; 
            cursor: pointer;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4);
        }

        .texto-norma {
            display: block;
            color: #ff0000; /* Caractere Vermelho solicitado */
            font-weight: bold;
            margin-top: 10px;
        }

        .ponto { position: absolute; width: 25px; height: 25px; border-radius: 50%; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); border: 2px solid #fff; }
        .fase { background: #ff0000; }
        .neutro { background: #0096ff; }
        .verde { background: #00ff00 !important; box-shadow: 0 0 15px #00ff00; }
    </style>
</head>
<body>

    <div id="projeto-container">
        <img src="ambiente.jpg" style="width:100%; height:100%; opacity: 0.6;">
        <div id="camadas-fios"></div>

        <!-- O Balão que só fecha no clique -->
        <div id="balao-informativo" onclick="fecharBalao()">
            <div style="color: #fff; font-size: 18px;">A fase pode ser de qualquer cor</div>
            <span class="texto-norma">(Item 6.1.5.3.4 da NBR-5410)</span>
        </div>

        <div id="pontoA" class="ponto"></div>
        <div id="pontoB" class="ponto" style="display: none;"></div>
    </div>

    <script>
        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "fase", pA: {t:"38%", l:"27%"}, pB: {t:"79.3%", l:"40.5%"} },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "neutro", pA: {t:"32.4%", l:"44.5%"}, pB: {t:"76.5%", l:"40%"} }
        ];

        let etapaAtual = 0;

        function carregarEtapa() {
            const e = etapas[etapaAtual];
            const pA = document.getElementById('pontoA');
            const pB = document.getElementById('pontoB');

            pA.className = `ponto ${e.cor}`;
            pA.style.top = e.pA.t;
            pA.style.left = e.pA.l;
            pA.style.display = "block";

            pB.className = `ponto ${e.cor}`;
            pB.style.top = e.pB.t;
            pB.style.left = e.pB.l;
            pB.style.display = "none";

            pA.onclick = () => { pA.classList.add('verde'); pB.style.display = "block"; };
            pB.onclick = () => { pB.classList.add('verde'); animar(); };
        }

        function animar() {
            const e = etapas[etapaAtual];
            const img = document.createElement('img');
            img.className = "camada-full";
            document.getElementById('camadas-fios').appendChild(img);

            let frame = 0;
            const loop = setInterval(() => {
                img.src = `${e.pasta}/quadro${frame.toString().padStart(4, '0')}.png`;
                if (frame >= e.max) {
                    clearInterval(loop);
                    // Regra do Balão para FASE 1
                    if (e.nome === "FASE 1") {
                        document.getElementById('balao-informativo').style.display = 'block';
                    } else {
                        proximaEtapa();
                    }
                }
                frame++;
            }, 40);
        }

        function fecharBalao() {
            document.getElementById('balao-informativo').style.display = 'none';
            proximaEtapa();
        }

        function proximaEtapa() {
            etapaAtual++;
            if (etapaAtual < etapas.length) {
                carregarEtapa();
            } else {
                console.log("Fiação concluída.");
            }
        }

        // Inicia o sistema
        carregarEtapa();
    </script>
</body>
</html>
