<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #010409;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- PAINEL DE MENSAGENS PADRÃO GIGANTE (IGUAL À FOTO) --- */
        #painel-status {
            width: 85%;
            max-width: 900px;
            margin: 25px 0;
            padding: 25px;
            background: rgba(5, 12, 25, 0.85);
            border: 1px solid #1a2a3a;
            border-radius: 15px;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #instrucao {
            color: #ffd700;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .txt-laranja { color: #ff9d00; }
        .txt-verde { color: #00ff00; }

        /* --- CONTAINER DO PROJETO --- */
        #projeto-container {
            position: relative;
            background: #0d1117;
            border-radius: 20px;
            padding: 10px;
            border: 2px solid #1f2937;
        }

        .imagem-base { max-width: 90vw; height: auto; border-radius: 10px; }
        
        .camada-full {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* BALÃO INFORMATIVO DINÂMICO */
        #balao-info {
            position: absolute;
            width: 25%;
            z-index: 150;
            display: none;
            pointer-events: none;
        }

        /* COMPONENTES */
        .acessorio-movel { position: absolute; z-index: 20; display: none; }
        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; transform: rotate(90deg); }

        /* PONTOS */
        .ponto-clique {
            position: absolute;
            width: 2%; aspect-ratio: 1/1;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
        }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 15px #ff0000; }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); box-shadow: 0 0 15px #0096ff; }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); box-shadow: 0 0 15px #ffa500; }
        .verde { background: #00ff00 !important; box-shadow: 0 0 25px #00ff00 !important; }
    </style>
</head>
<body>

    <div id="painel-status">
        <span id="instrucao">CARREGANDO LABORATÓRIO SMT PRO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>
        
        <!-- Balão de referência enviado -->
        <img src="bl-retorno.png" id="balao-info">

        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const txtInstrucao = document.getElementById('instrucao');
        const balao = document.getElementById('balao-info');

        // MENSAGENS ALEATÓRIAS NO NOVO PADRÃO VISUAL
        const msgsSaida = [
            "CLIQUE NA REFERÊNCIA DO <span class='txt-laranja'>PONTO DE SAÍDA</span>.",
            "INICIE A FIAÇÃO NO <span class='txt-laranja'>BORNE DESTACADO</span>.",
            "TOQUE NO PONTO PARA INICIAR A <span class='txt-laranja'>PASSAGEM DO CABO</span>."
        ];

        const msgsDestino = [
            "AGORA CLIQUE NA REFERÊNCIA DO <span class='txt-verde'>PONTO DE DESTINO</span>.",
            "LEVE O CONDUTOR ATÉ O <span class='txt-verde'>BORNE DE CHEGADA</span>.",
            "FINALIZE A CONEXÃO NO <span class='txt-verde'>PONTO INDICADO</span>."
        ];

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" }, info: true, posBalao: { top: "45%", left: "65%" } }
        ];

        let etapaAtual = 0;

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) {
                txtInstrucao.innerHTML = "<span class='txt-verde'>FIAÇÃO CONCLUÍDA! TESTE O CIRCUITO AGORA.</span>";
                return;
            }

            const e = etapas[etapaAtual];
            txtInstrucao.innerHTML = msgsSaida[Math.floor(Math.random() * msgsSaida.length)];
            
            // Esconde balão da etapa anterior
            balao.style.display = "none";

            const pA = document.getElementById('ponto-A');
            const pB = document.getElementById('ponto-B');

            pA.className = `ponto-clique ${e.cor}`;
            pA.style.top = e.posA.top; pA.style.left = e.posA.left;
            pA.style.display = "block";

            pB.className = `ponto-clique ${e.cor}`;
            pB.style.top = e.posB.top; pB.style.left = e.posB.left;
            pB.style.display = "none";

            pA.onclick = () => {
                pA.classList.add('verde');
                txtInstrucao.innerHTML = msgsDestino[Math.floor(Math.random() * msgsDestino.length)];
                pB.style.display = "block";
                
                // Se for etapa com balão informativo (Ex: Retorno)
                if(e.info) {
                    balao.style.top = e.posBalao.top;
                    balao.style.left = e.posBalao.left;
                    balao.style.display = "block";
                }
            };

            pB.onclick = () => {
                pB.classList.add('verde');
                animar(e, () => {
                    etapaAtual++;
                    pA.style.display = pB.style.display = "none";
                    pA.classList.remove('verde'); pB.classList.remove('verde');
                    iniciarEtapa();
                });
            };
        }

        function animar(conf, callback) {
            let q = 0;
            const img = document.createElement('img');
            img.className = "camada-full";
            document.getElementById('camadas-fios').appendChild(img);
            const t = setInterval(() => {
                img.src = `${conf.pasta}/quadro${q.toString().padStart(4, '0')}.png`;
                if (q >= conf.max) { 
                    clearInterval(t); 
                    if(conf.nome === "NEUTRO 1") document.getElementById('conector-neutro').style.display = "block";
                    callback(); 
                }
                q++;
            }, 40);
        }

        iniciarEtapa();
    </script>
</body>
</html>
