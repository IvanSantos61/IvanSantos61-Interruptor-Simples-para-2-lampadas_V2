<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: #060b13; color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100vw; height: 100vh; overflow: hidden;
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #060b13; z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .moldura-entrada {
            width: 80%; max-width: 900px; height: 70%; max-height: 450px;
            border: 3px solid #00f0ff; border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px; text-align: center;
        }
        .intro-entrada { color: #008b8b; font-size: 55px; text-transform: uppercase; margin: 0 0 10px 0; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin: 0 0 25px 0; }
        .subtitulo-entrada { color: #00f0ff; font-size: 24px; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 40px 0; }
        .btn-iniciar-lab {
            background: transparent; border: 2px solid #00f0ff; border-radius: 50px;
            color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase;
            padding: 12px 35px; cursor: pointer; animation: pulsarBotao 1.5s infinite;
        }
        @keyframes pulsarBotao { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* --- INTERFACE --- */
        #titulo-sistema {
            color: #00f0ff; font-size: 40px; margin-top: 2.5vh; margin-bottom: 1vh; text-align: center;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6); text-transform: uppercase;
        }
        #painel-status {
            width: 100%; max-width: 1200px; margin: 1vh auto 2vh auto; padding: 15px 40px;
            background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px;
            text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 95px;
        }
        #instrucao { color: #ffd700; font-size: 20px; font-weight: bold; text-transform: uppercase; }

        /* --- PAINEL DE STATUS (REPLICANDO GRAVURA) --- */
        #quadro-chaves-status {
            position: absolute;
            top: 45%;
            left: 58%;
            width: 220px;
            background-color: #040810;
            border: 2px solid #00f0ff;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            padding: 15px;
            z-index: 100;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
            font-family: 'Orbitron', sans-serif;
        }

        .titulo-quadro-status {
            color: #00f0ff;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            padding-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Molduras individuais dinâmicas */
        .item-chave-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 18px;
            margin: 6px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            transition: all 0.3s ease;
            background-color: rgba(0,0,0,0.5);
        }

        /* Estilos ON/OFF para as molduras */
        .moldura-on {
            border: 2px solid #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.4), inset 0 0 10px rgba(0, 255, 0, 0.1);
        }
        .moldura-off {
            border: 2px solid #ff0000;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.4), inset 0 0 10px rgba(255, 0, 0, 0.1);
        }

        /* Ícones conforme gravura */
        .icon-check { color: #00ff00; font-size: 22px; }
        .icon-error { color: #ff0000; font-size: 20px; font-weight: bold; }

        /* --- PROJETO --- */
        #projeto-container { position: relative; display: inline-block; margin-bottom: 2vh; border: 2px solid #1f2937; border-radius: 8px; }
        .imagem-base { max-width: 95vw; max-height: 70vh; display: block; object-fit: contain; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .tecla-movel, . carga-movel, .acessorio-movel { position: absolute; z-index: 20; }
        .tecla-movel { cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; z-index: 30; }

        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; display: none; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; display: none; transform: rotate(90deg); }

        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); }

        .btn-controle { position: absolute; border: none; padding: 8px 30px; font-size: 15px; font-weight: 900; text-transform: uppercase; border-radius: 20px; cursor: pointer; z-index: 110; }
        #btn-reiniciar { top: 92%; left: 13%; background: #b80000; color: #ffffff; }

        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1 / 1; border: 0.2vw solid #fff; border-radius: 50%; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); display: none; }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); }
        .verde { background: #00ff00 !important; }
        
        .tag-circuito { color: #ff3333; font-weight: 900; }
        .tag-rede { color: #00ff00; font-weight: 900; }
        .status-aceso { background: #006400 !important; color: #00ff00 !important; padding: 8px 30px; border-radius: 20px; }
        .txt-vermelho { color: #ff3333; font-weight: bold; }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 2<br>LÂMPADAS</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    
    <div id="painel-status">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <div id="quadro-chaves-status">
            <div class="titulo-quadro-status">STATUS DO CIRCUITO</div>
            <div id="item-dg" class="item-chave-status moldura-off"><span>DG</span><span id="chk-dg" class="icon-error">✘</span></div>
            <div id="item-dr" class="item-chave-status moldura-off"><span>DR</span><span id="chk-dr" class="icon-error">✘</span></div>
            <div id="item-int" class="item-chave-status moldura-off"><span>INT</span><span id="chk-int" class="icon-error">✘</span></div>
        </div>

        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const somDisjuntor = new Audio('disj.mp3');
        const somInterruptor = new Audio('int.mp3');
        const somConexao = new Audio('conexao.mp3');

        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const conectorN2 = document.getElementById('conector-neutro');
        const conectorN3 = document.getElementById('conector-neutro-3vias');
        const txtInstrucao = document.getElementById('instrucao');
        const telaEntrada = document.getElementById('tela-entrada');
        const quadroStatus = document.getElementById('quadro-chaves-status');

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        function iniciarLaboratorio() {
            telaEntrada.style.opacity = "0";
            setTimeout(() => { telaEntrada.style.visibility = "hidden"; iniciarEtapa(); }, 500);
        }

        function formatarTextoInstrucao(texto) {
            return texto
                .replace(/CIRCUITO:/g, '<span class="tag-circuito">CIRCUITO:</span>')
                .replace(/REDE:/g, '<span class="tag-rede">REDE:</span>');
        }

        function atualizarChecklist(dg, dr, int) {
            const chkDG = document.getElementById('chk-dg');
            const chkDR = document.getElementById('chk-dr');
            const chkInt = document.getElementById('chk-int');
            const itemDG = document.getElementById('item-dg');
            const itemDR = document.getElementById('item-dr');
            const itemInt = document.getElementById('item-int');

            // Atualização dinâmica das molduras e ícones
            if (dg === 'on') { chkDG.innerHTML = "✔"; chkDG.className = "icon-check"; itemDG.className = "item-chave-status moldura-on"; }
            else { chkDG.innerHTML = "✘"; chkDG.className = "icon-error"; itemDG.className = "item-chave-status moldura-off"; }

            if (dr === 'on') { chkDR.innerHTML = "✔"; chkDR.className = "icon-check"; itemDR.className = "item-chave-status moldura-on"; }
            else { chkDR.innerHTML = "✘"; chkDR.className = "icon-error"; itemDR.className = "item-chave-status moldura-off"; }

            if (int === 'on') { chkInt.innerHTML = "✔"; chkInt.className = "icon-check"; itemInt.className = "item-chave-status moldura-on"; }
            else { chkInt.innerHTML = "✘"; chkInt.className = "icon-error"; itemInt.className = "item-chave-status moldura-off"; }
        }

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            if (fiacaoConcluida) {
                quadroStatus.style.display = "flex";
                atualizarChecklist(dg, dr, int);
            }

            if (fiacaoConcluida && dg === 'on' && dr === 'on' && int === 'on') {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                txtInstrucao.innerHTML = "<span class='status-aceso'>LÂMPADAS ACESAS</span>";
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if (fiacaoConcluida) {
                    txtInstrucao.innerHTML = "FIAÇÃO FINALIZADA! <span class='txt-vermelho'>LIGUE O DG, DR E INTERRUPTOR E TESTE O CIRCUITO.</span>";
                }
            }
        }

        function alternarTecla(id, prefixo) {
            const el = document.getElementById(id);
            el.onclick = (e) => {
                e.stopPropagation();
                const status = el.getAttribute('data-status');
                const novoStatus = status === 'off' ? 'on' : 'off';
                el.src = prefixo + "_" + novoStatus + ".png";
                el.setAttribute('data-status', novoStatus);
                
                if (id === 'tecla-int') { somInterruptor.currentTime = 0; somInterruptor.play(); }
                else { somDisjuntor.currentTime = 0; somDisjuntor.play(); }

                verificarCircuito();
            };
        }

        alternarTecla('tecla-dg', 'al_dg');
        alternarTecla('tecla-dr', 'al_dr');
        alternarTecla('tecla-int', 'tec_int');

        const etapas = [
            { pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" }, msgA: "REDE: CLIQUE NA REFERENCIA INDICADA NO DR, PARA INICIAR A PASSAGEM DA FASE", msgB: "REDE: CLIQUE NO PONTO INDICADO NA CAIXA DE PASSAGEM, PARA LEVAR A FASE" },
            { pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76.5%", left: "40%" }, msgA: "REDE: CLIQUE NA REFERÊNCIA INDICADA NO BARRAMENTO PARA INICIAR A PASSAGEM DO NEUTRO", msgB: "REDE: CLIQUE NO PONTO INDICADO NA CAIXA DE PASSAGEM, PARA LEVAR O NEUTRO" },
            { pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "56%" }, msgA: "REDE: LEVE A FASE ATÉ A PRÓXIMA CAIXA. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA", msgB: "REDE: CLIQUE NA REFERENCIA INDICADA NA CAIXA PARA LEVAR A FASE" },
            { pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76.8%", left: "49%" }, posB: { top: "31%", left: "54.5%" }, msgA: "REDE: LEVE NEUTRO ATÉ A PRÓXIMA CAIXA. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA", msgB: "REDE: CLIQUE NA REFERENCIA INDICADA NA CAIXA PARA LEVAR O NEUTRO" },
            { pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" }, msgA: "CIRCUITO: LEVE A FASE AO INTERRUPTOR. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA", msgB: "CIRCUITO: CLIQUE NA REFERENCIA INDICADA NO INTERRUPTOR PARA LEVAR A FASE" },
            { pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" }, msgA: "CIRCUITO: LEVE O RETORNO PARA A CAIXA DE PASSAGEM. CLIQUE NA REFERENCIA INDICADA NO INTERRUPTOR.", msgB: "CIRCUITO: LEVE O RETORNO AO CONECTOR DE EMENDA. CLIQUE NA REFERENCIA INDICADA NA CAIXA" },
            { pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54.7%" }, posB: { top: "23%", left: "91%" }, msgA: "CIRCUITO: LEVE O NEUTRO À LÂMPADA 1. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA", msgB: "CIRCUITO: CLIQUE NA REFERENCIA INDICADA NA LÂMPADA PARA LEVAR O NEUTRO" },
            { pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "16%", left: "57%" }, posB: { top: "25%", left: "89%" }, msgA: "CIRCUITO: LEVE O RETORNO À LÂMPADA. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA", msgB: "CIRCUITO: CLIQUE NA REFERENCIA INDICADA NA LÂMPADA PARA LEVAR O RETORNO" },
            { pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" }, msgA: "CIRCUITO: CLIQUE NA REFERENCIA DA LAMPADA 1 PARA LEVAR O RETORNO PARA A LÂMPADA 2", msgB: "CIRCUITO: CLIQUE NA REFERENCIA DA LÂMPADA 2 PARA INTERLIGAR O RETORNO" },
            { pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" }, msgA: "CIRCUITO: CLIQUE NA REFERENCIA DA LAMPADA 1 PARA LEVAR O NEUTRO PARA A LÂMPADA 2", msgB: "CIRCUITO: CLIQUE NA REFERENCIA DA LÂMPADA 2 PARA INTERLIGAR O NEUTRO" }
        ];

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) { fiacaoConcluida = true; verificarCircuito(); return; }
            const c = etapas[etapaAtual];
            txtInstrucao.innerHTML = formatarTextoInstrucao(c.msgA);
            pontoA.className = "ponto-clique ponto-fase"; pontoA.style.top = c.posA.top; pontoA.style.left = c.posA.left;
            pontoA.style.display = "block";
            pontoB.className = "ponto-clique ponto-fase"; pontoB.style.top = c.posB.top; pontoB.style.left = c.posB.left;
            pontoB.style.display = "none";
        }

        pontoA.onclick = (e) => { e.stopPropagation(); pontoA.classList.add('verde'); txtInstrucao.innerHTML = formatarTextoInstrucao(etapas[etapaAtual].msgB); pontoB.style.display = "block"; };

        pontoB.onclick = (e) => {
            e.stopPropagation(); pontoB.classList.add('verde');
            const c = etapas[etapaAtual];
            const img = document.createElement('img'); img.className = "camada-full"; camadasFios.appendChild(img);
            let f = 0;
            const t = setInterval(() => {
                img.src = c.pasta + "/quadro" + f.toString().padStart(4, '0') + ".png";
                if (f >= c.max) {
                    clearInterval(t); somConexao.currentTime = 0; somConexao.play();
                    
                    // Lógica de acessórios
                    if (etapaAtual === 1) conectorN2.style.display = "block";
                    if (etapaAtual === 3) conectorN3.style.display = "block";

                    setTimeout(() => {
                        pontoA.style.display = "none"; pontoB.style.display = "none";
                        pontoA.classList.remove('verde'); pontoB.classList.remove('verde');
                        etapaAtual++; iniciarEtapa();
                    }, 600);
                } else { f++; }
            }, 40);
        };
    </script>
</body>
</html>
