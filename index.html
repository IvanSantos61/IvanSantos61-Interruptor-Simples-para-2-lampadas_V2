<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>SMT Pro - FioCerto</title>
    <style>
        body { background: #060b13; color: #ffd700; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; }
        #projeto-container { position: relative; width: 1000px; height: 600px; background: #000; border: 2px solid #1f2937; margin-top: 20px; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* Balão NBR-5410 - Padrão FioCerto */
        #balao-informativo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.98);
            border: 2px solid #ffd700;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            display: none; 
            cursor: pointer;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
        }

        .texto-norma {
            display: block;
            color: #ff0000; /* Vermelho solicitado */
            font-weight: bold;
            margin-top: 15px;
            font-size: 0.9em;
        }

        /* Pontos de Interação */
        .ponto { position: absolute; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); border: 2px solid #fff; transition: 0.2s; }
        .fase { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        .neutro { background: #0096ff; box-shadow: 0 0 10px #0096ff; }
        .verde { background: #00ff00 !important; box-shadow: 0 0 20px #00ff00 !important; }
        
        #status-bar { padding: 15px; color: #00f0ff; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="status-bar">AGUARDANDO INÍCIO</div>

    <div id="projeto-container">
        <img src="ambiente.jpg" style="width:100%; height:100%; opacity: 0.5;">
        <div id="camadas-fios"></div>

        <!-- Balão Informativo NBR-5410 -->
        <div id="balao-informativo" onclick="fecharBalao()">
            <div style="color: #fff; font-size: 20px;">A fase pode ser de qualquer cor</div>
            <span class="texto-norma">(Item 6.1.5.3.4 da NBR-5410)</span>
            <div style="font-size: 10px; color: #666; margin-top: 20px;">[ CLIQUE NESTE BALÃO PARA CONTINUAR ]</div>
        </div>

        <!-- Pontos de Controle Únicos -->
        <div id="ptA" class="ponto"></div>
        <div id="ptB" class="ponto" style="display: none;"></div>
    </div>

    <script>
        const configEtapas = [
            { id: "FASE 1", pasta: "FASE1", max: 24, cor: "fase", ax: "27%", ay: "38%", bx: "40.5%", by: "79.3%" },
            { id: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "neutro", ax: "44.5%", ay: "32.4%", bx: "40%", by: "76.5%" }
        ];

        let indiceEtapa = 0;

        function montarCenario() {
            const etapa = configEtapas[indiceEtapa];
            const pA = document.getElementById('ptA');
            const pB = document.getElementById('ptB');
            
            document.getElementById('status-bar').innerText = `EXECUTANDO: ${etapa.id}`;

            // Reset de pontos
            pA.className = `ponto ${etapa.cor}`;
            pA.style.left = etapa.ax;
            pA.style.top = etapa.ay;
            pA.style.display = "block";

            pB.className = `ponto ${etapa.cor}`;
            pB.style.left = etapa.bx;
            pB.style.top = etapa.by;
            pB.style.display = "none";

            pA.onclick = () => { pA.classList.add('verde'); pB.style.display = "block"; };
            pB.onclick = () => { pB.classList.add('verde'); rodarAnimacao(); };
        }

        function rodarAnimacao() {
            const etapa = configEtapas[indiceEtapa];
            const container = document.getElementById('camadas-fios');
            const novaCamada = document.createElement('img');
            novaCamada.className = "camada-full";
            container.appendChild(novaCamada);

            let quadro = 0;
            const timer = setInterval(() => {
                novaCamada.src = `${etapa.pasta}/quadro${quadro.toString().padStart(4, '0')}.png`;
                if (quadro >= etapa.max) {
                    clearInterval(timer);
                    validarFimDaEtapa();
                }
                quadro++;
            }, 45);
        }

        function validarFimDaEtapa() {
            if (configEtapas[indiceEtapa].id === "FASE 1") {
                document.getElementById('balao-informativo').style.display = 'block';
            } else {
                proximo();
            }
        }

        function fecharBalao() {
            document.getElementById('balao-informativo').style.display = 'none';
            proximo();
        }

        function proximo() {
            indiceEtapa++;
            if (indiceEtapa < configEtapas.length) {
                montarCenario();
            } else {
                document.getElementById('status-bar').innerText = "FIAÇÃO COMPLETA!";
                document.getElementById('ptA').style.display = "none";
                document.getElementById('ptB').style.display = "none";
            }
        }

        // Inicialização
        window.onload = montarCenario;
    </script>
</body>
</html>
