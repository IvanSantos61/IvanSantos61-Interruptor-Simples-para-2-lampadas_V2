<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste de Fiação - FioCerto SMT</title>
    <style>
        body {
            margin: 0;
            background-color: #0d0d0d;
            color: #ffd700;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #cenario-container {
            position: relative;
            border: 2px solid #444;
            background-color: #000;
            line-height: 0;
            cursor: crosshair;
        }

        #ambiente-img {
            max-width: 85vw;
            height: auto;
            display: block;
        }

        /* Configuração dos Fios */
        .fio {
            position: absolute;
            z-index: 10;
            pointer-events: none; /* Clique passa para o container */
        }

        /* Estilo visual para debug */
        .fase { filter: drop-shadow(0 0 5px #ff0000); }
        .neutro { filter: drop-shadow(0 0 5px #00ffff); }
        .retorno { filter: drop-shadow(0 0 5px #ffa500); }

        .painel-ajuda {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>Posicionamento de Quadros - Teste</h2>

    <div id="cenario-container">
        <!-- Imagem de Fundo -->
        <img src="ambiente.jpg" id="ambiente-img">

        <!-- FASES -->
        <img src="FASE1/quadro0000.png" class="fio fase" id="fase1" style="top: 10%; left: 10%;">
        <img src="FASE2/quadro0000.png" class="fio fase" id="fase2" style="top: 15%; left: 10%;">
        <img src="FASE3/quadro0000.png" class="fio fase" id="fase3" style="top: 20%; left: 10%;">

        <!-- NEUTROS -->
        <img src="NEUTRO1/quadro0000.png" class="fio neutro" id="neutro1" style="top: 30%; left: 10%;">
        <img src="NEUTRO2/quadro0000.png" class="fio neutro" id="neutro2" style="top: 35%; left: 10%;">
        <img src="NEUTRO3/quadro0000.png" class="fio neutro" id="neutro3" style="top: 40%; left: 10%;">

        <!-- RETORNOS -->
        <img src="RETORNO1/quadro0000.png" class="fio retorno" id="retorno1" style="top: 55%; left: 10%;">
        <img src="RETORNO2/quadro0000.png" class="fio retorno" id="retorno2" style="top: 60%; left: 10%;">
        <img src="RETORNO3/quadro0000.png" class="fio retorno" id="retorno3" style="top: 65%; left: 10%;">
    </div>

    <div class="painel-ajuda">
        <p id="coord-info">Clique na imagem para capturar a posição do eletroduto.</p>
        <small>Dica: Use as coordenadas geradas para mover os quadros no código.</small>
    </div>

    <script>
        const container = document.getElementById('cenario-container');
        const info = document.getElementById('coord-info');

        container.addEventListener('click', function(e) {
            const rect = container.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;

            const resultado = `top: ${y.toFixed(2)}%; left: ${x.toFixed(2)}%;`;
            info.innerHTML = `<strong>Coordenada:</strong> ${resultado}`;
            console.log(resultado);
            
            // Criar um marcador temporário no local do clique
            const dot = document.createElement('div');
            dot.style.cssText = `position:absolute; width:6px; height:6px; background:white; border-radius:50%; top:${y}%; left:${x}%; z-index:100;`;
            container.appendChild(dot);
            setTimeout(() => dot.remove(), 2000);
        });

        // Função útil para você testar outros quadros via Console (F12)
        // Exemplo de uso: trocarQuadro('fase1', 'FASE1', 12)
        function trocarQuadro(idElemento, pasta, numero) {
            const numFormatado = numero.toString().padStart(4, '0');
            document.getElementById(idElemento).src = `${pasta}/quadro${numFormatado}.png`;
        }
    </script>
</body>
</html>
