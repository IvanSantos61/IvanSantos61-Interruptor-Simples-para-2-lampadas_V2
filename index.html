<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #050505;
            color: #ffd700;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* --- PADRÃO DE MENSAGENS REFERÊNCIA SMT PRO --- */
        #painel-status {
            margin-top: 15px;
            padding: 10px 20px;
            background: #111;
            border-radius: 5px;
            border-bottom: 3px solid #ffd700;
            text-align: center;
            z-index: 200;
            min-width: 320px;
        }

        .txt-laranja { color: #ff9d00; font-weight: bold; }
        .txt-verde { color: #00ff00; font-weight: bold; }
        .txt-vermelho { color: #ff3333; font-weight: bold; }

        /* --- ESTRUTURA DO PROJETO --- */
        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-top: 10px;
            border: 2px solid #333;
            line-height: 0;
        }

        .imagem-base { max-width: 95vw; height: auto; display: block; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* COMPONENTES */
        .tecla-movel { position: absolute; z-index: 30; cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.5%; left: 75.5%; width: 6.5%; }

        .carga-movel { position: absolute; z-index: 25; display: none; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }
        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; }

        /* PONTOS DE CLIQUE */
        .ponto-clique {
            position: absolute; width: 1.8%; aspect-ratio: 1/1;
            border: 0.2vw solid #fff; border-radius: 50%;
            cursor: pointer; z-index: 100; transform: translate(-50%, -50%);
            display: none;
        }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 1vw #ff0000; }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); box-shadow: 0 0 1vw #0096ff; }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); box-shadow: 0 0 1vw #ffa500; }
        .ponto-clique.verde { background: #00ff00 !important; box-shadow: 0 0 1.5vw #00ff00 !important; }
    </style>
</head>
<body>

    <div id="painel-status">
        <strong id="fio-atual">INICIANDO SIMULADOR</strong><br>
        <span id="instrucao">Conclua a fiação para testar o circuito.</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        // BANCO DE MENSAGENS ALEATÓRIAS (Padrão SMT Pro)
        const msgsSaida = [
            "Toque no <span class='txt-laranja'>PONTO DE SAÍDA</span> do cabo.",
            "Inicie a conexão no <span class='txt-laranja'>BORNE DESTACADO</span>.",
            "Selecione a <span class='txt-laranja'>ORIGEM</span> do condutor.",
            "Clique no <span class='txt-laranja'>PONTO VERMELHO</span> para iniciar."
        ];

        const msgsDestino = [
            "Agora toque no <span class='txt-verde'>PONTO DE DESTINO</span>.",
            "Leve o cabo até o <span class='txt-verde'>BORNE DE CHEGADA</span>.",
            "Conclua o trajeto no <span class='txt-verde'>PONTO INDICADO</span>.",
            "Finalize a conexão no <span class='txt-verde'>PONTO DE CHEGADA</span>."
        ];

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "55.5%" } },
            { nome: "NEUTRO 2", pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76%", left: "49%" }, posB: { top: "31%", left: "54%" } },
            { nome: "FASE 3", pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" } },
            { nome: "NEUTRO 3", pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54%" }, posB: { top: "23%", left: "91%" } },
            { nome: "RETORNO 2", pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "14%", left: "57%" }, posB: { top: "25%", left: "89%" } },
            { nome: "RETORNO 3", pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" } },
            { nome: "NEUTRO 4", pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" } }
        ];

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').dataset.status === 'on';
            const dr = document.getElementById('tecla-dr').dataset.status === 'on';
            const int = document.getElementById('tecla-int').dataset.status === 'on';

            if (fiacaoConcluida && dg && dr && int) {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                document.getElementById('fio-atual').innerHTML = "<span class='txt-verde'>LÂMPADAS ACESAS</span>";
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if(fiacaoConcluida) document.getElementById('fio-atual').innerHTML = "<span class='txt-vermelho'>LÂMPADAS APAGADAS</span>";
            }
        }

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) {
                fiacaoConcluida = true;
                document.getElementById('fio-atual').innerHTML = "✓ <span class='txt-verde'>FIAÇÃO COMPLETA</span>";
                document.getElementById('instrucao').innerText = "Ligue o DG, DR e o Interruptor para testar.";
                verificarCircuito();
                return;
            }

            const config = etapas[etapaAtual];
            document.getElementById('fio-atual').innerText = `INSTALANDO: ${config.nome}`;
            document.getElementById('instrucao').innerHTML = msgsSaida[Math.floor(Math.random() * msgsSaida.length)];

            const pA = document.getElementById('ponto-A');
            const pB = document.getElementById('ponto-B');

            pA.className = `ponto-clique ${config.cor}`;
            pA.style.top = config.posA.top; pA.style.left = config.posA.left;
            pA.style.display = "block";

            pB.className = `ponto-clique ${config.cor}`;
            pB.style.top = config.posB.top; pB.style.left = config.posB.left;
            pB.style.display = "none";

            pA.onclick = (e) => {
                e.stopPropagation();
                pA.classList.add('verde');
                document.getElementById('instrucao').innerHTML = msgsDestino[Math.floor(Math.random() * msgsDestino.length)];
                pB.style.display = "block";
            };

            pB.onclick = (e) => {
                e.stopPropagation();
                pB.classList.add('verde');
                animar(config, () => {
                    etapaAtual++;
                    pA.style.display = pB.style.display = "none";
                    pA.classList.remove('verde'); pB.classList.remove('verde');
                    iniciarEtapa();
                });
            };
        }

        function animar(conf, callback) {
            let q = 0;
            const img = document.createElement('img');
            img.className = "camada-full";
            document.getElementById('camadas-fios').appendChild(img);
            const t = setInterval(() => {
                img.src = `${conf.pasta}/quadro${q.toString().padStart(4, '0')}.png`;
                if (q >= conf.max) { clearInterval(t); callback(); }
                q++;
            }, 40);
        }

        function toggle(id, pref) {
            const el = document.getElementById(id);
            el.onclick = () => {
                const s = el.dataset.status === 'off' ? 'on' : 'off';
                el.src = `${pref}_${s}.png`;
                el.dataset.status = s;
                verificarCircuito();
            };
        }

        toggle('tecla-dg', 'al_dg');
        toggle('tecla-dr', 'al_dr');
        toggle('tecla-int', 'tec_int');

        iniciarEtapa();
    </script>
</body>
</html>
