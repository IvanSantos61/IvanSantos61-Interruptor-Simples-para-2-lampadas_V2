<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalação Sequencial - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: #050505;
            color: #ffd700;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        #projeto-container {
            position: relative;
            width: 95vw;
            max-width: 1920px;
            aspect-ratio: 1920 / 1080;
            background-color: #000;
            border: 2px solid #333;
            margin-top: 10px;
        }

        .camada-full {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fio-camada { z-index: 10; pointer-events: none; }

        /* Pontos de Interação */
        .ponto-clique {
            position: absolute;
            width: 25px;
            height: 25px;
            border: 3px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            display: none; /* Escondidos por padrão */
        }

        /* Cores baseadas no tipo de fio atual */
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); }

        .ponto-clique.verde {
            background: #00ff00 !important;
            box-shadow: 0 0 15px #00ff00;
        }

        #painel-status {
            margin-top: 15px;
            padding: 10px 30px;
            background: #111;
            border-radius: 5px;
            border-bottom: 3px solid #ffd700;
            text-align: center;
            min-width: 400px;
        }
    </style>
</head>
<body>

    <div id="painel-status">
        <strong id="fio-atual">INSTALANDO: FASE 1</strong><br>
        <span id="instrucao">Clique no ponto de saída.</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="camada-full" style="z-index: 1;">
        
        <!-- Camadas de Fios -->
        <div id="camadas-fios"></div>

        <!-- Pontos de Clique (Ajuste as coordenadas conforme seu cenário) -->
        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const txtFio = document.getElementById('fio-atual');
        const txtInstrucao = document.getElementById('instrucao');

        // Definição das etapas da instalação
        const etapas = [
            {
                nome: "FASE 1",
                pasta: "FASE1",
                quadro: "quadro0024.png",
                corClasse: "ponto-fase",
                posA: { top: "30%", left: "20%" }, // Exemplo: Saída do Disjuntor
                posB: { top: "50%", left: "40%" }  // Exemplo: Entrada da Tomada
            },
            {
                nome: "NEUTRO 1",
                pasta: "NEUTRO1",
                quadro: "quadro0054.png",
                corClasse: "ponto-neutro",
                posA: { top: "20%", left: "10%" }, // Exemplo: Barramento Neutro
                posB: { top: "50%", left: "45%" }  // Exemplo: Neutro na Tomada
            }
        ];

        let etapaAtual = 0;

        function carregarEtapa() {
            const config = etapas[etapaAtual];
            
            // Atualiza Texto
            txtFio.innerText = `INSTALANDO: ${config.nome}`;
            txtInstrucao.innerText = "Clique no ponto de SAÍDA.";

            // Configura Ponto A
            pontoA.className = `ponto-clique ${config.corClasse}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";

            // Configura Ponto B (escondido até A ser clicado)
            pontoB.className = `ponto-clique ${config.corClasse}`;
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        // Clique no Ponto A
        pontoA.addEventListener('click', function() {
            this.classList.add('verde');
            txtInstrucao.innerText = "Agora clique no ponto de CHEGADA.";
            pontoB.style.display = "block";
        });

        // Clique no Ponto B
        pontoB.addEventListener('click', function() {
            this.classList.add('verde');
            
            // Renderiza o fio completado
            const config = etapas[etapaAtual];
            const imgFio = document.createElement('img');
            imgFio.src = `${config.pasta}/${config.quadro}`;
            imgFio.className = "camada-full fio-camada";
            camadasFios.appendChild(imgFio);

            // Prepara próxima etapa
            setTimeout(() => {
                pontoA.style.display = "none";
                pontoB.style.display = "none";
                pontoA.classList.remove('verde');
                pontoB.classList.remove('verde');

                etapaAtual++;
                if (etapaAtual < etapas.length) {
                    carregarEtapa();
                } else {
                    txtFio.innerText = "INSTALAÇÃO CONCLUÍDA!";
                    txtInstrucao.innerText = "Todos os cabos foram passados.";
                }
            }, 800);
        });

        // Inicializa o app
        carregarEtapa();

        // Utilitário de coordenadas no console
        document.getElementById('projeto-container').onclick = function(e) {
            const rect = this.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 100;
            const y = ((e.clientY - rect.top) / rect.height) * 100;
            console.log(`top: "${y.toFixed(2)}%", left: "${x.toFixed(2)}%"`);
        };
    </script>
</body>
</html>
