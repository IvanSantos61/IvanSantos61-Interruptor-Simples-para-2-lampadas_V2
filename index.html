<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        body {
            background-color: #0b0e14;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #instrucoes {
            background: rgba(15, 25, 40, 0.8);
            border: 1px solid #1a2a40;
            border-radius: 10px;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 60px;
            color: #ffcc00;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #projeto-container {
            position: relative;
            width: 900px;
            height: 600px;
            background: linear-gradient(135deg, #2c3e50, #4ca1af);
            border: 5px solid #1a2a40;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Representação do Painel QD-01 */
        #painel-eletrico {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 400px;
            height: 300px;
            background: #bdc3c7;
            border: 3px solid #7f8c8d;
            border-radius: 5px;
        }

        .disjuntor {
            position: absolute;
            background: #eee;
            border: 1px solid #999;
            width: 40px;
            height: 80px;
            top: 100px;
        }

        /* Interruptor e Lâmpada */
        #interruptor {
            position: absolute;
            bottom: 50px;
            right: 250px;
            width: 60px;
            height: 100px;
            background: #fff;
            border-radius: 5px;
            cursor: pointer;
            border: 2px solid #ddd;
        }

        #lampada {
            position: absolute;
            bottom: 80px;
            right: 50px;
            width: 60px;
            height: 90px;
            background: #f9f9f9;
            border-radius: 50% 50% 40% 40%;
            border: 2px solid #ccc;
        }

        /* ESTILO DOS BALÕES NBR-5410 */
        .balao-informativo {
            position: absolute;
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            z-index: 2000;
            width: 240px;
            text-align: center;
            font-family: Arial, sans-serif;
            font-size: 14px;
            color: #333;
            cursor: pointer;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, 10px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        .balao-informativo::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 12px solid white;
        }

        .norma-vermelha {
            color: #ff0000;
            display: block;
            font-size: 11px;
            font-weight: bold;
            margin-top: 8px;
            text-transform: uppercase;
        }

        #btn-reiniciar {
            margin-top: 20px;
            padding: 10px 30px;
            background: #cc0000;
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        #btn-reiniciar:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        /* Pontos de conexão (visual apenas para o exemplo) */
        .ponto-ref {
            position: absolute;
            width: 12px;
            height: 12px;
            background: rgba(0, 255, 255, 0.5);
            border: 2px solid #00ffff;
            border-radius: 50%;
            z-index: 100;
        }

    </style>
</head>
<body>

    <h1>Laboratório SMT Pro</h1>

    <div id="instrucoes">
        FASE OK! CONECTE O RETORNO: CLIQUE NA REFERÊNCIA DO INTERRUPTOR.
    </div>

    <div id="projeto-container">
        <!-- Simulação do Painel -->
        <div id="painel-eletrico">
            <div style="padding: 10px; font-weight: bold;">QD-01</div>
            <div class="disjuntor" style="left: 100px;" id="ponto-fase-origem"></div>
        </div>

        <!-- Componentes -->
        <div id="interruptor">
            <div class="ponto-ref" style="top: 20px; left: 22px;" id="ponto-fase-destino"></div>
            <div class="ponto-ref" style="bottom: 20px; left: 22px;" id="ponto-retorno-origem"></div>
        </div>

        <div id="lampada">
            <div class="ponto-ref" style="top: -15px; left: 22px;" id="ponto-retorno-destino"></div>
        </div>

        <!-- O Fio Fase 1 (Simulado como já conectado para o teste do balão) -->
        <svg width="100%" height="100%" style="position:absolute; pointer-events:none;">
            <path id="fio-fase" d="M 170 140 L 170 500 L 610 500 L 610 520" stroke="#ff4444" stroke-width="6" fill="none" />
        </svg>
    </div>

    <button id="btn-reiniciar" onclick="location.reload()">REINICIAR</button>

    <script>
        // Simulação da conclusão da Fase 1 para disparar o balão
        window.onload = function() {
            setTimeout(finalizarFase1, 500);
        };

        function finalizarFase1() {
            const container = document.getElementById('projeto-container');
            
            // Remove balão anterior se existir
            const antigo = document.getElementById('balao-fase');
            if (antigo) antigo.remove();

            // Cria o elemento do balão seguindo o padrão da gravura
            const balao = document.createElement('div');
            balao.className = 'balao-informativo';
            balao.id = 'balao-fase';
            
            // Posicionamento sobre a fiação da fase/interruptor
            balao.style.left = "480px";
            balao.style.top = "400px";
            balao.style.transform = "translateX(-50%)";

            // Conteúdo: Texto em preto e Norma em Vermelho abaixo
            balao.innerHTML = `
                A Fase pode ser de qualquer cor.
                <span class="norma-vermelha">(Item 6.1.5.3.4 da NBR-5410)</span>
            `;
            
            container.appendChild(balao);

            // Adiciona o evento de clique global para fechar
            // Usamos um timeout pequeno para o clique que abre não fechar imediatamente
            setTimeout(() => {
                document.addEventListener('mousedown', fecharBalao);
            }, 100);
        }

        function fecharBalao(event) {
            const balao = document.getElementById('balao-fase');
            if (balao) {
                balao.remove();
                // Remove o listener para limpar a memória e permitir cliques normais
                document.removeEventListener('mousedown', fecharBalao);
                
                // Atualiza instruções para o próximo passo
                document.getElementById('instrucoes').innerHTML = "BALÃO LIDO. AGORA PROSSIGA COM O FIO DE RETORNO.";
                document.getElementById('instrucoes').style.color = "#00ffff";
                
                console.log("Balão fechado pelo usuário. Iniciando etapa de Retorno.");
            }
        }
    </script>
</body>
</html>
