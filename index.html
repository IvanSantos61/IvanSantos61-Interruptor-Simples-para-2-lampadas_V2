<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; padding: 0; background-color: #060b13; color: #ffd700; font-family: 'Segoe UI', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; width: 100vw; height: 100vh; overflow: hidden; }

        @keyframes surgirPlaca {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        @keyframes pulsarNeon {
            0% { box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; }
            50% { box-shadow: 0 0 40px #00ff00, inset 0 0 20px #00ff00; }
            100% { box-shadow: 0 0 20px #00ff00, inset 0 0 10px #00ff00; }
        }

        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #060b13; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .moldura-entrada { width: 80%; max-width: 900px; height: 70%; max-height: 450px; border: 3px solid #00f0ff; border-radius: 25px; box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .intro-entrada { color: #008b8b; font-size: 55px; font-weight: 400; line-height: 1.1; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 15px rgba(0, 139, 139, 0.5); margin: 0 0 10px 0; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; font-weight: 400; line-height: 1.2; letter-spacing: 1px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin: 0 0 25px 0; }
        .subtitulo-entrada { color: #00f0ff; font-size: 24px; font-weight: 450; letter-spacing: 5px; text-transform: uppercase; margin: 0 0 40px 0; }
        .creditos-entrada { color: #445566; font-size: 15px; font-weight: 500; margin-bottom: 30px; }
        .btn-iniciar-lab { background: transparent; border: 2px solid #00f0ff; border-radius: 50px; color: #00f0ff; font-size: 16px; font-weight: bold; text-transform: uppercase; padding: 12px 35px; cursor: pointer; letter-spacing: 1px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); transition: all 0.3s ease; animation: pulsarBotao 1.5s infinite; }
        @keyframes pulsarBotao { 0% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); } 50% { opacity: 1; box-shadow: 0 0 25px rgba(0,240,255,0.6); } 100% { opacity: 0.5; box-shadow: 0 0 10px rgba(0,240,255,0.2); } }
        
        @keyframes scannerPlaca { 0% { top: -45%; } 100% { top: 120%; } }
        @keyframes scannerLinha { 0% { top: -5%; } 100% { top: 105%; } }
        
        .balao-informativo { position: absolute; background: rgba(4, 10, 20, 0.95); border-radius: 12px; padding: 15px; color: #fff; font-size: 14px; text-align: center; z-index: 130; pointer-events: none; opacity: 0; display: none; transition: opacity 0.4s ease; line-height: 1.4; box-sizing: border-box; }
        #balao-secao { width: 230px; top: 42%; left: 2.5%; border: 2px solid #ffd700; }
        #balao-fase-norma { width: 210px; top: 39%; left: 46%; border: 2px solid #ffd700; }
        #balao-conector { width: 210px; top: 16.3%; left: 32%; border: 2px solid #ffd700; background: rgba(255, 0, 0, 0.95); }
        #balao-retorno-cor { width: 220px; top: 40%; left: 42.3%; border: 2px solid #ffa500; }
        #balao-retorno-comum { width: 195px; top: 38%; left: 63.5%; border: 2px solid #ffa500; background: rgba(255, 0, 0, 0.95); }
        #balao-cores { width: 230px; top: 68%; left: 2.5%; border: 2px solid #00f0ff; }
        #balao-neutro-norma { width: 260px; top: 34%; left: 21%; border: 2px solid #0096ff; }
        #balao-neutro-comum { width: 170px; top: 38%; left: 78.5%; border: 2px solid #0096ff; background: rgba(255, 0, 0, 0.95); }
        
        .balao-informativo:after { content: ''; position: absolute; right: -12px; top: 50%; margin-top: -10px; border-top: 10px solid transparent; border-bottom: 10px solid transparent; }
        #balao-secao:after, #balao-fase-norma:after, #balao-conector:after { border-left: 10px solid #ffd700; }
        #balao-retorno-cor:after, #balao-retorno-comum:after { border-left: 10px solid #ffa500; }
        #balao-cores:after { border-left: 10px solid #00f0ff; }
        #balao-neutro-norma:after, #balao-neutro-comum:after { border-left: 10px solid #0096ff; }
        
        .balao-informativo:before { content: ''; position: absolute; right: -9px; top: 50%; margin-top: -8px; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 8px solid rgba(4, 10, 20, 0.95); z-index: 1; }
        #balao-retorno-comum:before, #balao-neutro-comum:before, #balao-conector:before { border-left: 8px solid rgba(255, 0, 0, 0.95) !important; }
        
        .txt-norma-vermelho { color: #ff3333; font-weight: bold; display: block; margin-top: 10px; font-size: 12px; }
        #titulo-sistema { color: #00f0ff; font-size: 40px; font-weight: 400; letter-spacing: 2px; margin-top: 2.5vh; margin-bottom: 1vh; text-align: center; text-transform: uppercase; }
        #painel-status { width: 100%; max-width: 1200px; margin: 1vh auto 2vh auto; padding: 20px 40px; background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 80px; }
        #instrucao { font-family: 'Arial Narrow', Arial, sans-serif; color: #ffd700; font-size: 20px; font-weight: bold; text-transform: uppercase; }
        .tag-circuito { color: #ff3333; font-weight: 900; }
        .tag-rede { color: #00ff00; font-weight: 900; }
        #projeto-container { position: relative; display: inline-block; margin-bottom: 20px; border: 2px solid #1f2937; box-shadow: 0 0 40px rgba(0,0,0,0.9); width: 100%; max-width: 1000px; box-sizing: border-box; }
        .imagem-base { width: 100%; height: auto; display: block; border-radius: 8px; }
        .btn-controle { position: absolute; border: none; padding: 8px 30px; font-size: 15px; font-weight: 900; text-transform: uppercase; border-radius: 20px; cursor: pointer; z-index: 110; }
        #btn-ajuda { top: 83%; left: 14.5%; background: #004f77; color: #00f0ff; border: 1px solid #00f0ff; }
        #btn-reiniciar { top: 92%; left: 13%; background: #b80000; color: #ffffff; }
        
        /* ESTILOS DOS BOTÕES */
        #btn-checklist { top: 55%; left: 45%; background: #ffcc00; color: #000; width: 180px; z-index: 9999 !important; }
        #btn-teste { top: 65%; left: 45%; background: #00ff00; color: #000; width: 180px; z-index: 9999 !important; display: none; }
        
        #painel-dispositivos { position: absolute; top: 67%; left: 57.3%; width: 170px; background: rgba(4, 10, 20, 0.9); border: 2px solid #1f2937; border-radius: 10px; padding: 12px; z-index: 110; display: none; flex-direction: column; gap: 8px; }
        .container-item { width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; background: #040a14; border: 1.5px solid #00f0ff; border-radius: 15px; }
        .label-dispositivo { font-size: 13px; font-weight: 700; color: #ffffff; }
        #placa-concluido { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 45%; height: 25%; background: linear-gradient(135deg, #1a2026 0%, #0a0d10 100%); border: 3px solid #00ff00; border-radius: 10px; z-index: 150; display: none; align-items: center; justify-content: center; overflow: hidden; animation: surgirPlaca 0.6s forwards, pulsarNeon 2s infinite; }
        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1 / 1; border: 0.2vw solid #fff; border-radius: 50%; cursor: pointer; z-index: 130; transform: translate(-50%, -50%); display: none; }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); } .ponto-neutro { background: rgba(0, 150, 255, 0.7); } .ponto-retorno { background: rgba(255, 165, 0, 0.7); }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <div class="intro-entrada">Laboratório SMT Pro</div>
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 92<br>LÂMPADAS</h1>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    <div id="painel-status"><span id="instrucao">CARREGANDO...</span></div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" style="position:absolute; top:25.5%; left:11.8%; width:6%; cursor:pointer;" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" style="position:absolute; top:27.7%; left:23.2%; width:7.5%; cursor:pointer;" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" style="position:absolute; top:53.7%; left:75.6%; width:7.7%; cursor:pointer;" data-status="off">
        
        <div id="painel-dispositivos">
            <div class="container-item"><span class="label-dispositivo">DG:</span><span id="status-dg" style="color: #ff3333;">✘</span></div>
            <div class="container-item"><span class="label-dispositivo">DR:</span><span id="status-dr" style="color: #ff3333;">✘</span></div>
            <div class="container-item"><span class="label-dispositivo">INT:</span><span id="status-int" style="color: #ff3333;">✘</span></div>
        </div>

        <button id="btn-ajuda" class="btn-controle">AJUDA</button>
        <button id="btn-reiniciar" class="btn-controle">REINICIAR</button>
        <button id="btn-checklist" class="btn-controle" onclick="exibirChecklistFinal()" style="display: none;">📋 VER CHECKLIST</button>
        <button id="btn-teste" class="btn-controle" onclick="realizarTesteFinal()">⚡ TESTAR CIRCUITO</button>

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

<script>
    let etapaAtual = 0;
    let fiacaoConcluida = false;
    let cicloAtivo = false;
    const painelDispositivos = document.getElementById('painel-dispositivos');
    const txtInstrucao = document.getElementById('instrucao');

    function iniciarLaboratorio() { document.getElementById('tela-entrada').style.display = 'none'; iniciarEtapa(); }
    
    function verificarCircuito() {
        const dg = document.getElementById('tecla-dg').getAttribute('data-status');
        const dr = document.getElementById('tecla-dr').getAttribute('data-status');
        const int = document.getElementById('tecla-int').getAttribute('data-status');
        
        if (fiacaoConcluida) {
            painelDispositivos.style.display = "flex";
            document.getElementById('btn-teste').style.display = "block";
            
            const elDg = document.getElementById('status-dg'); elDg.textContent = dg === 'on' ? '✔' : '✘'; elDg.style.color = dg === 'on' ? '#00ff00' : '#ff3333';
            const elDr = document.getElementById('status-dr'); elDr.textContent = dr === 'on' ? '✔' : '✘'; elDr.style.color = dr === 'on' ? '#00ff00' : '#ff3333';
            const elInt = document.getElementById('status-int'); elInt.textContent = int === 'on' ? '✔' : '✘'; elInt.style.color = int === 'on' ? '#00ff00' : '#ff3333';
        }
    }

    function realizarTesteFinal() {
        const dg = document.getElementById('tecla-dg').getAttribute('data-status');
        const dr = document.getElementById('tecla-dr').getAttribute('data-status');
        const int = document.getElementById('tecla-int').getAttribute('data-status');
        
        if(dg === 'on' && dr === 'on' && int === 'on') {
            alert("Teste do Circuito: STATUS OK!");
        } else {
            alert("Erro: Verifique se o DG, DR e Interruptor estão ligados!");
        }
    }

    function alternarTecla(id, prefixo) {
        document.getElementById(id).onclick = () => {
            const el = document.getElementById(id);
            const status = el.getAttribute('data-status') === 'off' ? 'on' : 'off';
            el.src = prefixo + "_" + status + ".png";
            el.setAttribute('data-status', status);
            verificarCircuito();
        };
    }
    alternarTecla('tecla-dg', 'al_dg'); alternarTecla('tecla-dr', 'al_dr'); alternarTecla('tecla-int', 'tec_int');

    function iniciarEtapa() {
        if (etapaAtual >= 10) { 
            fiacaoConcluida = true; 
            document.getElementById('btn-checklist').style.display = 'block';
            verificarCircuito();
        }
    }
    
    function exibirChecklistFinal() { alert("Checklist completo!"); }
</script>
</body>
</html>
