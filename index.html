<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            background-color: #060b13; color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            width: 100vw; height: 100vh; overflow: hidden;
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #060b13; z-index: 1000; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .moldura-entrada { width: 80%; max-width: 900px; height: 70%; max-height: 450px; border: 3px solid #00f0ff; border-radius: 25px; box-shadow: 0 0 50px rgba(0, 240, 255, 0.4); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .titulo-entrada { color: #00f0ff; font-size: 38px; text-transform: uppercase; text-shadow: 0 0 25px rgba(0, 240, 255, 0.6); margin: 0 0 25px 0; }
        .btn-iniciar-lab { background: transparent; border: 2px solid #00f0ff; border-radius: 50px; color: #00f0ff; font-size: 16px; font-weight: bold; padding: 12px 35px; cursor: pointer; animation: pulsarBotao 1.5s infinite; }
        @keyframes pulsarBotao { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- INTERFACE --- */
        #titulo-sistema { color: #00f0ff; font-size: 40px; margin-top: 2.5vh; margin-bottom: 1vh; text-align: center; text-transform: uppercase; }
        #painel-status { width: 100%; max-width: 1200px; margin: 1vh auto 2vh auto; padding: 15px; background: rgba(4, 10, 20, 0.9); border: 1px solid #16222f; border-radius: 12px; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 95px; }
        #instrucao { color: #ffd700; font-size: 20px; font-weight: bold; text-transform: uppercase; }

        /* --- PAINEL DE STATUS (REPLICANDO PADRÃO-PS.PNG) --- */
        #quadro-chaves-status {
            position: absolute; top: 48%; left: 60%; width: 220px;
            background: rgba(6, 11, 19, 0.95); border: 2px solid #00f0ff; border-radius: 12px;
            display: none; flex-direction: column; padding: 12px; z-index: 100; box-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
        }
        .titulo-quadro-status { color: #00f0ff; font-size: 11px; font-weight: bold; text-align: center; padding-bottom: 10px; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .item-chave-status {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 15px; margin: 5px 0;
            border: 2px solid #00f0ff; /* Moldura individual como na gravura */
            border-radius: 8px; font-size: 16px; font-weight: bold; color: #00f0ff;
            background: rgba(0, 240, 255, 0.05);
        }
        .chk-ok { color: #00ff00; text-shadow: 0 0 10px #00ff00; }
        .chk-no { color: #ff3333; text-shadow: 0 0 10px #ff3333; }

        /* --- AMBIENTE E PROJETO --- */
        #projeto-container { position: relative; display: inline-block; border: 2px solid #1f2937; }
        .imagem-base { max-width: 95vw; max-height: 70vh; display: block; object-fit: contain; }
        .camada-full { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* TECLAS */
        .tecla-movel { position: absolute; z-index: 20; cursor: pointer; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; z-index: 30; }

        /* LÂMPADAS */
        .carga-movel { position: absolute; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); }
        #lampada1, #lampada2 { top: 4.5%; left: 68.8%; width: 49.5%; }
        #lampada2 { top: 43.8%; }

        /* PONTOS DE CLIQUE */
        .ponto-clique { position: absolute; width: 1.8%; aspect-ratio: 1/1; border: 2px solid #fff; border-radius: 50%; cursor: pointer; z-index: 100; transform: translate(-50%, -50%); display: none; }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .verde { background: #00ff00 !important; }

        #btn-reiniciar { position: absolute; top: 92%; left: 13%; background: #b80000; color: #fff; padding: 8px 30px; border: none; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 110; }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h1>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">INICIAR LABORATÓRIO</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>
    <div id="painel-status"><span id="instrucao">CARREGANDO...</span></div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <div id="quadro-chaves-status">
            <div class="titulo-quadro-status">STATUS DO CIRCUITO</div>
            <div class="item-chave-status"><span>DG</span><span id="chk-dg" class="chk-no">✘</span></div>
            <div class="item-chave-status"><span>DR</span><span id="chk-dr" class="chk-no">✘</span></div>
            <div class="item-chave-status"><span>INT</span><span id="chk-int" class="chk-no">✘</span></div>
        </div>

        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
        <button id="btn-reiniciar">REINICIAR</button>
    </div>

    <script>
        const somDisjuntor = new Audio('disj.mp3');
        const somInterruptor = new Audio('int.mp3');
        const somConexao = new Audio('conexao.mp3');

        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const txtInstrucao = document.getElementById('instrucao');
        const quadroStatus = document.getElementById('quadro-chaves-status');

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        function iniciarLaboratorio() {
            document.getElementById('tela-entrada').style.display = "none";
            iniciarEtapa();
        }

        function atualizarChecklist(dg, dr, int) {
            document.getElementById('chk-dg').innerHTML = dg === 'on' ? "✔" : "✘";
            document.getElementById('chk-dg').className = dg === 'on' ? "chk-ok" : "chk-no";
            document.getElementById('chk-dr').innerHTML = dr === 'on' ? "✔" : "✘";
            document.getElementById('chk-dr').className = dr === 'on' ? "chk-ok" : "chk-no";
            document.getElementById('chk-int').innerHTML = int === 'on' ? "✔" : "✘";
            document.getElementById('chk-int').className = int === 'on' ? "chk-ok" : "chk-no";
        }

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            if (fiacaoConcluida) {
                quadroStatus.style.display = "flex";
                atualizarChecklist(dg, dr, int);
                if (dg === 'on' && dr === 'on' && int === 'on') {
                    document.getElementById('lampada1').style.display = "block";
                    document.getElementById('lampada2').style.display = "block";
                    txtInstrucao.innerText = "LÂMPADAS ACESAS!";
                } else {
                    document.getElementById('lampada1').style.display = "none";
                    document.getElementById('lampada2').style.display = "none";
                    txtInstrucao.innerText = "FIAÇÃO CONCLUÍDA! TESTE O CIRCUITO.";
                }
            }
        }

        function alternarTecla(id, prefixo) {
            const el = document.getElementById(id);
            el.onclick = () => {
                const s = el.getAttribute('data-status') === 'off' ? 'on' : 'off';
                el.src = prefixo + "_" + s + ".png";
                el.setAttribute('data-status', s);
                if(id === 'tecla-int') somInterruptor.play(); else somDisjuntor.play();
                verificarCircuito();
            };
        }

        alternarTecla('tecla-dg', 'al_dg');
        alternarTecla('tecla-dr', 'al_dr');
        alternarTecla('tecla-int', 'tec_int');

        const etapas = [
            { pasta: "FASE1", max: 24, posA: { t: "38%", l: "27%" }, posB: { t: "79.3%", l: "40.5%" }, msgA: "CLIQUE NO DISJUNTOR", msgB: "LEVE A FASE ATÉ A CAIXA" }
            // As outras 9 etapas seguem aqui conforme sua lógica original
        ];

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) { fiacaoConcluida = true; verificarCircuito(); return; }
            const c = etapas[etapaAtual];
            txtInstrucao.innerText = c.msgA;
            pontoA.style.top = c.posA.t; pontoA.style.left = c.posA.l; pontoA.style.display = "block";
            pontoB.style.top = c.posB.t; pontoB.style.left = c.posB.l; pontoB.style.display = "none";
            pontoA.classList.remove('verde'); pontoB.classList.remove('verde');
        }

        pontoA.onclick = () => { pontoA.classList.add('verde'); pontoB.style.display = "block"; txtInstrucao.innerText = etapas[etapaAtual].msgB; };
        pontoB.onclick = () => {
            pontoB.classList.add('verde');
            const c = etapas[etapaAtual];
            const img = document.createElement('img'); img.className = "camada-full"; camadasFios.appendChild(img);
            let f = 0;
            const t = setInterval(() => {
                img.src = c.pasta + "/quadro" + f.toString().padStart(4, '0') + ".png";
                if (f >= c.max) { clearInterval(t); somConexao.play(); etapaAtual++; setTimeout(iniciarEtapa, 600); } else f++;
            }, 40);
        };

        document.getElementById('btn-reiniciar').onclick = () => location.reload();
    </script>
</body>
</html>
