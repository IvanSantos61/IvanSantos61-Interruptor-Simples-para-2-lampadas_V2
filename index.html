<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Garante que nada transborde da tela do PC */
        }

        /* --- IDENTIFICAÇÃO DO SISTEMA --- */
        #titulo-sistema {
            color: #00f0ff;
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-top: 3vh;
            margin-bottom: 1vh;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            text-transform: uppercase;
        }

        /* --- PAINEL DE FORA A FORA --- */
        #painel-status {
            width: 100%;
            max-width: 1200px;
            margin: 1vh auto 2vh auto;
            padding: 20px 40px;
            background: rgba(4, 10, 20, 0.9);
            border: 1px solid #16222f;
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        #instrucao {
            color: #ffd700;
            font-size: 19px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.4;
        }

        .txt-laranja { color: #ff9d00; font-weight: bold; }
        .txt-verde { color: #00ff00; font-weight: bold; }
        .txt-vermelho { color: #ff3333; font-weight: bold; }

        /* --- ÁREA DO PROJETO --- */
        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-bottom: 2vh;
            border: 2px solid #1f2937;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            line-height: 0;
            max-height: 70vh;
        }

        .imagem-base {
            max-width: 95vw;
            max-height: 70vh; 
            display: block;
            object-fit: contain;
            border-radius: 8px;
        }

        .camada-full {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* --- COMPONENTES --- */
        .tecla-movel, .carga-movel, .acessorio-movel {
            position: absolute;
            z-index: 20; 
            user-select: none;
            -webkit-user-drag: none;
        }

        .tecla-movel { cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; z-index: 30; }

        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; display: none; z-index: 15; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; display: none; z-index: 16; transform: rotate(90deg); }

        #lampada1 { top: 4.5%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }
        #lampada2 { top: 43.8%; left: 68.8%; width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }

        /* --- CONTROLES COM POSICIONAMENTO MANUAL LIBERADO --- */
        .btn-controle {
            position: absolute;
            border: none;
            padding: 8px 30px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 110;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: background 0.2s, transform 0.1s;
        }

        #btn-ajuda {
            top: 83%; 
            left: 14.5%;
            background: #004f77;
            color: #00f0ff;
            border: 1px solid #00f0ff;
        }
        #btn-ajuda:hover { background: #007bb3; }

        #btn-reiniciar {
            top: 92%;
            left: 13%;
            background: #b80000;
            color: #ffffff;
        }
        #btn-reiniciar:hover { background: #d60000; }
        
        .btn-controle:active { transform: scale(0.96); }

        /* --- MODAL AJUDA TÉCNICA --- */
        #modal-ajuda {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 55%; 
            max-width: 90%;
            background: #0a111a;
            border: 2px solid #00f0ff;
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            border-radius: 12px;
            padding: 20px;
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        #modal-ajuda h3 {
            color: #00f0ff;
            text-transform: uppercase;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 17px;
            letter-spacing: 1px;
        }

        .lista-ajuda {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .item-ajuda {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid #162e3d;
            border-radius: 6px;
            color: #fff;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .item-ajuda:hover {
            border-color: #00f0ff;
            background: rgba(0, 79, 119, 0.2);
        }

        .btn-fechar-modal {
            background: #222;
            color: #aaa;
            border: 1px solid #444;
            padding: 10px 40px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
        }
        .btn-fechar-modal:hover { background: #333; color: #fff; }

        /* TELA DE EXIBIÇÃO DA GRAVURA DE SUPORTE */
        #tela-imagem-ajuda {
            width: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
        }
        #img-suporte {
            width: auto;
            max-width: 100%; 
            height: auto;
            max-height: 52vh; 
            border-radius: 6px;
            border: 1px solid #162e3d;
            margin-bottom: 15px;
            object-fit: contain;
        }

        /* --- PONTOS DE CLIQUE --- */
        .ponto-clique {
            position: absolute;
            width: 1.8%; aspect-ratio: 1 / 1;
            border: 0.2vw solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
        }

        .ponto-fase { background: rgba(255, 0, 0, 0.7); box-shadow: 0 0 1vw #ff0000; }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); box-shadow: 0 0 1vw #0096ff; }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); box-shadow: 0 0 1vw #ffa500; }
        .ponto-clique.verde { background: #00ff00 !important; box-shadow: 0 0 1.5vw #00ff00 !important; }
    </style>
</head>
<body>

    <div id="titulo-sistema">Laboratório SMT Pro</div>

    <div id="painel-status">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <button id="btn-ajuda" class="btn-controle">Ajuda</button>
        <button id="btn-reiniciar" class="btn-controle">Reiniciar</button>

        <div id="modal-ajuda">
            <div id="menu-lista-ajuda" style="width:100%; display:flex; flex-direction:column; align-items:center;">
                <h3>Ajuda Técnica</h3>
                <div class="lista-ajuda">
                    <button class="item-ajuda" onclick="abrirGravuraAjuda('ligaint.png')">1. Ligação do Interruptor</button>
                    <button class="item-ajuda" onclick="abrirGravuraAjuda('ligabocal.png')">2. Ligação da Lâmpada</button>
                    <button class="item-ajuda" onclick="abrirGravuraAjuda('emendas4.png')">3. Emendas e conexões (Caixa 01)</button>
                    <button class="item-ajuda" onclick="abrirGravuraAjuda('emendas3.png')">4. Emendas e conexões (Caixa 02)</button>
                </div>
                <button class="btn-fechar-modal" onclick="fecharModalAjuda()">Fechar</button>
            </div>
            
            <div id="tela-imagem-ajuda">
                <img src="" id="img-suporte">
                <button class="btn-fechar-modal" onclick="voltarParaListaAjuda()">Voltar</button>
            </div>
        </div>

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const conectorN2 = document.getElementById('conector-neutro');
        const conectorN3 = document.getElementById('conector-neutro-3vias');
        const txtInstrucao = document.getElementById('instrucao');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const btnAjuda = document.getElementById('btn-ajuda');
        const modalAjuda = document.getElementById('modal-ajuda');

        const msgsSaida = [
            "CLIQUE NA REFERÊNCIA DO <span class='txt-laranja'>PONTO DE SAÍDA</span> DO CABO ATUAL.",
            "INICIE A CONEXÃO CLICANDO NO <span class='txt-laranja'>BORNE DE ORIGEM</span> DESTACADO.",
            "TOQUE NO PONTO INDICADO PARA <span class='txt-laranja'>INICIAR A PASSAGEM</span> DO CONDUTOR."
        ];

        const msgsDestino = [
            "AGORA SELECIONE A REFERÊNCIA DO <span class='txt-verde'>PONTO DE DESTINO</span>.",
            "LEVE O CABO CONECTADO ATÉ O <span class='txt-verde'>BORNE DE CHEGADA</span>.",
            "CLIQUE NO PONTO ILUMINADO PARA <span class='txt-verde'>FINALIZAR O PERCURSO</span>."
        ];

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "80%", left: "40%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76%", left: "41%" } },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "55.5%" } },
            { nome: "NEUTRO 2", pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76%", left: "49%" }, posB: { top: "31%", left: "54%" } },
            { nome: "FASE 3", pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" } },
            { nome: "NEUTRO 3", pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54%" }, posB: { top: "23%", left: "91%" } },
            { nome: "RETORNO 2", pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "14%", left: "57%" }, posB: { top: "25%", left: "89%" } },
            { nome: "RETORNO 3", pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" } },
            { nome: "NEUTRO 4", pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" } }
        ];

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        btnAjuda.onclick = (e) => {
            e.stopPropagation();
            modalAjuda.style.display = "flex";
            voltarParaListaAjuda();
        };

        function fecharModalAjuda() { modalAjuda.style.display = "none"; }

        function abrirGravuraAjuda(nomeArquivo) {
            document.getElementById('menu-lista-ajuda').style.display = "none";
            const telaImg = document.getElementById('tela-imagem-ajuda');
            document.getElementById('img-suporte').src = nomeArquivo;
            
            modalAjuda.style.width = "fit-content";
            modalAjuda.style.maxWidth = "75%";
            telaImg.style.display = "flex";
        }

        function voltarParaListaAjuda() {
            document.getElementById('tela-imagem-ajuda').style.display = "none";
            modalAjuda.style.width = "55%";
            document.getElementById('menu-lista-ajuda').style.display = "flex";
        }

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            if (fiacaoConcluida && dg === 'on' && dr === 'on' && int === 'on') {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                txtInstrucao.innerHTML = "<span class='txt-verde'>CIRCUITO ENERGIZADO: AS LÂMPADAS ESTÃO ACESAS!</span>";
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if(fiacaoConcluida) {
                    txtInstrucao.innerHTML = "FIAÇÃO OK! <span class='txt-vermelho'>LIGUE O DG, DR E INTERRUPTOR PARA TESTAR.</span>";
                }
            }
        }

        function alternarTecla(id, prefixo) {
            const el = document.getElementById(id);
            el.onclick = (e) => {
                e.stopPropagation();
                const status = el.getAttribute('data-status');
                const novoStatus = status === 'off' ? 'on' : 'off';
                el.src = `${prefixo}_${novoStatus}.png`;
                el.setAttribute('data-status', novoStatus);
                verificarCircuito();
            };
        }

        alternarTecla('tecla-dg', 'al_dg');
        alternarTecla('tecla-dr', 'al_dr');
        alternarTecla('tecla-int', 'tec_int');

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) {
                fiacaoConcluida = true;
                verificarCircuito();
                return;
            }
            const config = etapas[etapaAtual];

            // Textos fixos personalizados para a saída (Ponto A)
            if (config.nome === "FASE 1") {
                txtInstrucao.innerHTML = "REDE: CLIQUE NA REFERENCIA INDICADA NO DR, PARA INICIAR A PASSAGEM DA FASE";
            } else if (config.nome === "NEUTRO 1") {
                txtInstrucao.innerHTML = "REDE: CLIQUE NA REFERÊNCIA INDICADA NO BARRAMENTO PARA INICIAR A PASSAGEM DO NEUTRO";
            } else if (config.nome === "FASE 2") {
                txtInstrucao.innerHTML = "REDE: LEVE A FASE ATÉ A PRÓXIMA CAIXA. CLIQUE NA REFERENCIA INDICADA NO CONECTOR DE EMENDA";
            } else {
                const fraseAleatoria = msgsSaida[Math.floor(Math.random() * msgsSaida.length)];
                txtInstrucao.innerHTML = `${config.nome} DETECTADO! ${fraseAleatoria}`;
            }

            pontoA.className = `ponto-clique ${config.cor}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";

            pontoB.className = `ponto-clique ${config.cor}`;
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        function animarPassagemCabo(config, callback) {
            let quadroAtual = 0;
            const imgFio = document.createElement('img');
            imgFio.className = "camada-full";
            camadasFios.appendChild(imgFio);

            const timer = setInterval(() => {
                imgFio.src = `${config.pasta}/quadro${quadroAtual.toString().padStart(4, '0')}.png`;
                
                if (quadroAtual >= config.max) {
                    clearInterval(timer);
                    if(config.nome === "NEUTRO 1") conectorN2.style.display = "block";
                    if(config.nome === "NEUTRO 2") conectorN3.style.display = "block";
                    if (callback) callback();
                } else {
                    quadroAtual++;
                }
            }, 40); 
        }

        pontoA.onclick = (e) => {
            e.stopPropagation();
            pontoA.classList.add('verde');
            
            const nomeEtapa = etapas[etapaAtual].nome;

            // Textos fixos personalizados para o destino (Ponto B)
            if (nomeEtapa === "FASE 1") {
                txtInstrucao.innerHTML = "REDE: CLIQUE NO PONTO INDICADO NA CAIXA DE PASSAGEM, PARA LEVAR A FASE";
            } else if (nomeEtapa === "NEUTRO 1") {
                txtInstrucao.innerHTML = "REDE: CLIQUE NO PONTO INDICADO NA CAIXA DE PASSAGEM, PARA LEVAR O NEUTRO";
            } else if (nomeEtapa === "FASE 2") {
                txtInstrucao.innerHTML = "REDE: CLIQUE NA REFERENCIA INDICADA NA CAIXA PARA LEVAR A FASE";
            } else {
                const fraseAleatoria = msgsDestino[Math.floor(Math.random() * msgsDestino.length)];
                txtInstrucao.innerHTML = `${nomeEtapa} EM CURSO: ${fraseAleatoria}`;
            }
            pontoB.style.display = "block";
        };

        pontoB.onclick = (e) => {
            e.stopPropagation();
            pontoB.classList.add('verde');
            animarPassagemCabo(etapas[etapaAtual], () => {
                setTimeout(() => {
                    pontoA.style.display = "none";
                    pontoB.style.display = "none";
                    pontoA.classList.remove('verde');
                    pontoB.classList.remove('verde');
                    etapaAtual++;
                    iniciarEtapa();
                }, 600);
            });
        };

        btnReiniciar.onclick = (e) => {
            e.stopPropagation();
            fecharModalAjuda();
            etapaAtual = 0;
            fiacaoConcluida = false;
            camadasFios.innerHTML = "";
            conectorN2.style.display = "none";
            conectorN3.style.display = "none";
            document.getElementById('lampada1').style.display = "none";
            document.getElementById('lampada2').style.display = "none";

            const chaves = [
                { id: 'tecla-dg', pref: 'al_dg' },
                { id: 'tecla-dr', pref: 'al_dr' },
                { id: 'tecla-int', pref: 'tec_int' }
            ];
            chaves.forEach(ch => {
                const el = document.getElementById(ch.id);
                el.setAttribute('data-status', 'off');
                el.src = `${ch.pref}_off.png`;
            });

            pontoA.classList.remove('verde');
            pontoB.classList.remove('verde');
            iniciarEtapa();
        };

        iniciarEtapa();
    </script>
</body>
</html>
