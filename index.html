<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório SMT Pro - FioCerto</title>
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #060b13;
            color: #ffd700;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* --- TELA DE ENTRADA --- */
        #tela-entrada {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #060b13;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .moldura-entrada {
            width: 80%;
            max-width: 900px;
            height: 70%;
            max-height: 450px;
            border: 3px solid #00f0ff;
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(0, 240, 255, 0.4), inset 0 0 20px rgba(0, 240, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .titulo-entrada {
            color: #00f0ff;
            font-size: 52px;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.6);
            margin: 0 0 25px 0;
        }

        .subtitulo-entrada {
            color: #00f0ff;
            font-size: 24px;
            font-weight: 450;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0 0 50px 0;
        }

        .creditos-entrada {
            color: #445566;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 50px;
        }

        .btn-iniciar-lab {
            color: #00f0ff;
            font-size: 14px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 15px;
            animation: piscarTexto 1.2s infinite ease-in-out;
        }

        @keyframes piscarTexto {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 1; }
        }

        /* --- BALÃO INFORMATIVO NBR-5410 --- */
        #balao-norma {
            position: absolute;
            top: 45%;
            left: 5%;
            width: 260px;
            background: rgba(4, 10, 20, 0.95);
            border: 2px solid #ffd700;
            border-radius: 12px;
            padding: 15px;
            color: #fff;
            font-size: 14px;
            text-align: center;
            z-index: 120;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .txt-norma-vermelho {
            color: #ff3333;
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        /* --- IDENTIFICAÇÃO DO SISTEMA --- */
        #titulo-sistema {
            color: #00f0ff;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-top: 2.5vh;
            margin-bottom: 1vh;
            text-align: center;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
            text-transform: uppercase;
        }

        /* --- PAINEL DE STATUS --- */
        #painel-status {
            width: 100%;
            max-width: 1200px;
            margin: 1vh auto 2vh auto;
            padding: 20px 40px;
            background: rgba(4, 10, 20, 0.9);
            border: 1px solid #16222f;
            border-radius: 12px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80px;
        }

        #instrucao {
            font-family: 'Arial Narrow', Arial, sans-serif;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .status-aceso { background: #006400 !important; color: #00ff00 !important; padding: 8px 30px; border-radius: 20px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.4); }
        .status-apagado { background: #b80000 !important; color: #ffffff !important; padding: 8px 30px; border-radius: 20px; box-shadow: 0 0 15px rgba(184, 0, 0, 0.4); }
        .txt-laranja { color: #ff9d00; font-weight: bold; }
        .txt-verde { color: #00ff00; font-weight: bold; }
        .txt-vermelho { color: #ff3333; font-weight: bold; }

        /* --- ÁREA DO PROJETO --- */
        #projeto-container {
            position: relative;
            display: inline-block; 
            margin-bottom: 2vh;
            border: 2px solid #1f2937;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            max-height: 70vh;
        }

        .imagem-base {
            max-width: 95vw;
            max-height: 70vh; 
            display: block;
            object-fit: contain;
            border-radius: 8px;
        }

        .camada-full {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* --- COMPONENTES --- */
        .tecla-movel, .carga-movel, .acessorio-movel { position: absolute; z-index: 20; user-select: none; }
        .tecla-movel { cursor: pointer; padding: 10px; margin: -10px; }
        #tecla-dg { top: 25.5%; left: 11.8%; width: 6%; }
        #tecla-dr { top: 27.7%; left: 23.2%; width: 7.5%; }
        #tecla-int { top: 53.7%; left: 75.6%; width: 7.7%; z-index: 30; }

        #conector-neutro { top: 75.2%; left: 39.5%; width: 9%; display: none; z-index: 15; }
        #conector-neutro-3vias { top: 20%; left: 51.4%; width: 9%; display: none; z-index: 16; transform: rotate(90deg); }

        #lampada1, #lampada2 { width: 49.5%; display: none; z-index: 25; filter: drop-shadow(0 0 20px #fff700); pointer-events: none; }
        #lampada1 { top: 4.5%; left: 68.8%; }
        #lampada2 { top: 43.8%; left: 68.8%; }

        /* --- CONTROLES --- */
        .btn-controle {
            position: absolute;
            border: none;
            padding: 8px 30px;
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            border-radius: 20px;
            cursor: pointer;
            z-index: 110;
        }

        #btn-ajuda { top: 83%; left: 14.5%; background: #004f77; color: #00f0ff; border: 1px solid #00f0ff; }
        #btn-reiniciar { top: 92%; left: 13%; background: #b80000; color: #ffffff; }

        /* --- PLACA CONCLUÍDO --- */
        #placa-concluido {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 38%;
            background: linear-gradient(135deg, #2c3540 0%, #182026 100%);
            border: 3px solid #111;
            border-radius: 10px;
            z-index: 150;
            display: none; 
            align-items: center;
            justify-content: center;
        }

        #texto-concluido { font-size: 4.5vw; font-weight: 700; color: #00ff00; text-shadow: 0 0 20px rgba(0, 255, 0, 0.7); }

        /* --- PONTOS DE CLIQUE --- */
        .ponto-clique {
            position: absolute;
            width: 1.8%; aspect-ratio: 1 / 1;
            border: 0.2vw solid #fff;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
            transform: translate(-50%, -50%);
            display: none;
        }
        .ponto-fase { background: rgba(255, 0, 0, 0.7); }
        .ponto-neutro { background: rgba(0, 150, 255, 0.7); }
        .ponto-retorno { background: rgba(255, 165, 0, 0.7); }
        .ponto-clique.verde { background: #00ff00 !important; }
    </style>
</head>
<body>

    <div id="tela-entrada">
        <div class="moldura-entrada">
            <h1 class="titulo-entrada">INTERRUPTOR SIMPLES PARA 2 LÂMPADAS</h1>
            <h2 class="subtitulo-entrada">CIRCUITO MONOFÁSICO - 127V</h2>
            <div class="creditos-entrada">© Desenvolvido por Ivan Santos - ConectaeadPLUS - 2026</div>
            <button class="btn-iniciar-lab" onclick="iniciarLaboratorio()">Clique para iniciar o Laboratório</button>
        </div>
    </div>

    <div id="titulo-sistema">Laboratório SMT Pro</div>

    <div id="painel-status">
        <span id="instrucao">CARREGANDO...</span>
    </div>

    <div id="projeto-container">
        <img src="ambiente.jpg" class="imagem-base">
        <div id="camadas-fios"></div>

        <div id="balao-norma">
            A seção mínima dos fios de iluminação é 1,5mm²
            <span class="txt-norma-vermelho">(Item 6.2.6.1.1 da NBR-5410)</span>
        </div>

        <img src="conector2vias.png" id="conector-neutro" class="acessorio-movel">
        <img src="conector3vias.png" id="conector-neutro-3vias" class="acessorio-movel">
        
        <img src="al_dg_off.png" id="tecla-dg" class="tecla-movel" data-status="off">
        <img src="al_dr_off.png" id="tecla-dr" class="tecla-movel" data-status="off">
        <img src="tec_int_off.png" id="tecla-int" class="tecla-movel" data-status="off">

        <img src="lamp_on.png" id="lampada1" class="carga-movel">
        <img src="lamp_on.png" id="lampada2" class="carga-movel">

        <div id="placa-concluido">
            <div id="texto-concluido">✓ Concluído</div>
        </div>

        <button id="btn-ajuda" class="btn-controle">Ajuda</button>
        <button id="btn-reiniciar" class="btn-controle">Reiniciar</button>

        <div id="ponto-A" class="ponto-clique"></div>
        <div id="ponto-B" class="ponto-clique"></div>
    </div>

    <script>
        const camadasFios = document.getElementById('camadas-fios');
        const pontoA = document.getElementById('ponto-A');
        const pontoB = document.getElementById('ponto-B');
        const balaoNorma = document.getElementById('balao-norma');
        const conectorN2 = document.getElementById('conector-neutro');
        const conectorN3 = document.getElementById('conector-neutro-3vias');
        const txtInstrucao = document.getElementById('instrucao');
        const btnReiniciar = document.getElementById('btn-reiniciar');
        const telaEntrada = document.getElementById('tela-entrada');

        function iniciarLaboratorio() {
            telaEntrada.style.opacity = "0";
            setTimeout(() => { telaEntrada.style.visibility = "hidden"; }, 500);
        }

        // Lógica para sumir o balão da norma no primeiro clique
        document.getElementById('projeto-container').addEventListener('mousedown', function() {
            if (balaoNorma) {
                balaoNorma.style.opacity = "0";
                setTimeout(() => { balaoNorma.style.display = "none"; }, 400);
            }
        }, { once: true });

        const etapas = [
            { nome: "FASE 1", pasta: "FASE1", max: 24, cor: "ponto-fase", posA: { top: "38%", left: "27%" }, posB: { top: "79.3%", left: "40.5%" } },
            { nome: "NEUTRO 1", pasta: "NEUTRO1", max: 54, cor: "ponto-neutro", posA: { top: "32.4%", left: "44.5%" }, posB: { top: "76.5%", left: "40%" } },
            { nome: "FASE 2", pasta: "FASE2", max: 24, cor: "ponto-fase", posA: { top: "79%", left: "49%" }, posB: { top: "31%", left: "56%" } },
            { nome: "NEUTRO 2", pasta: "NEUTRO2", max: 24, cor: "ponto-neutro", posA: { top: "76.8%", left: "49%" }, posB: { top: "31%", left: "54.5%" } },
            { nome: "FASE 3", pasta: "FASE3", max: 30, cor: "ponto-fase", posA: { top: "16%", left: "56%" }, posB: { top: "56%", left: "72%" } },
            { nome: "RETORNO 1", pasta: "RETORNO1", max: 36, cor: "ponto-retorno", posA: { top: "62%", left: "72%" }, posB: { top: "30%", left: "57%" } },
            { nome: "NEUTRO 3", pasta: "NEUTRO3", max: 30, cor: "ponto-neutro", posA: { top: "17%", left: "54.7%" }, posB: { top: "23%", left: "91%" } },
            { nome: "RETORNO 2", pasta: "RETORNO2", max: 30, cor: "ponto-retorno", posA: { top: "16%", left: "57%" }, posB: { top: "25%", left: "89%" } },
            { nome: "RETORNO 3", pasta: "RETORNO3", max: 30, cor: "ponto-retorno", posA: { top: "25%", left: "89%" }, posB: { top: "64%", left: "89%" } },
            { nome: "NEUTRO 4", pasta: "NEUTRO4", max: 24, cor: "ponto-neutro", posA: { top: "25%", left: "91.5%" }, posB: { top: "63%", left: "91%" } }
        ];

        let etapaAtual = 0;
        let fiacaoConcluida = false;

        function verificarCircuito() {
            const dg = document.getElementById('tecla-dg').getAttribute('data-status');
            const dr = document.getElementById('tecla-dr').getAttribute('data-status');
            const int = document.getElementById('tecla-int').getAttribute('data-status');

            if (fiacaoConcluida && dg === 'on' && dr === 'on' && int === 'on') {
                document.getElementById('lampada1').style.display = "block";
                document.getElementById('lampada2').style.display = "block";
                txtInstrucao.innerHTML = "<span class='status-aceso'>LÂMPADAS ACESAS</span>";
            } else {
                document.getElementById('lampada1').style.display = "none";
                document.getElementById('lampada2').style.display = "none";
                if (fiacaoConcluida) txtInstrucao.innerHTML = "FIAÇÃO OK! <span class='txt-vermelho'>LIGUE O DG, DR E INTERRUPTOR PARA TESTAR.</span>";
            }
        }

        function alternarTecla(id, prefixo) {
            const el = document.getElementById(id);
            el.onclick = (e) => {
                e.stopPropagation();
                const status = el.getAttribute('data-status');
                const novoStatus = status === 'off' ? 'on' : 'off';
                el.src = `${prefixo}_${novoStatus}.png`;
                el.setAttribute('data-status', novoStatus);
                verificarCircuito();
            };
        }

        alternarTecla('tecla-dg', 'al_dg');
        alternarTecla('tecla-dr', 'al_dr');
        alternarTecla('tecla-int', 'tec_int');

        function iniciarEtapa() {
            if (etapaAtual >= etapas.length) {
                fiacaoConcluida = true;
                verificarCircuito();
                return;
            }
            const config = etapas[etapaAtual];
            txtInstrucao.innerHTML = `ETAPA: ${config.nome} - SIGA AS INSTRUÇÕES DE CONEXÃO.`;
            pontoA.className = `ponto-clique ${config.cor}`;
            pontoA.style.top = config.posA.top;
            pontoA.style.left = config.posA.left;
            pontoA.style.display = "block";
            pontoB.className = `ponto-clique ${config.cor}`;
            pontoB.style.top = config.posB.top;
            pontoB.style.left = config.posB.left;
            pontoB.style.display = "none";
        }

        pontoA.onclick = (e) => {
            e.stopPropagation();
            pontoA.classList.add('verde');
            pontoB.style.display = "block";
        };

        pontoB.onclick = (e) => {
            e.stopPropagation();
            pontoB.classList.add('verde');
            let quadroAtual = 0;
            const imgFio = document.createElement('img');
            imgFio.className = "camada-full";
            camadasFios.appendChild(imgFio);
            const timer = setInterval(() => {
                imgFio.src = `${etapas[etapaAtual].pasta}/quadro${quadroAtual.toString().padStart(4, '0')}.png`;
                if (quadroAtual >= etapas[etapaAtual].max) {
                    clearInterval(timer);
                    if(etapas[etapaAtual].nome === "NEUTRO 1") conectorN2.style.display = "block";
                    if(etapas[etapaAtual].nome === "NEUTRO 2") conectorN3.style.display = "block";
                    setTimeout(() => {
                        pontoA.style.display = "none";
                        pontoB.style.display = "none";
                        pontoA.classList.remove('verde');
                        pontoB.classList.remove('verde');
                        etapaAtual++;
                        iniciarEtapa();
                    }, 600);
                } else { quadroAtual++; }
            }, 40);
        };

        btnReiniciar.onclick = () => {
            location.reload(); // Forma mais simples de resetar tudo incluindo o balão
        };

        iniciarEtapa();
    </script>
</body>
</html>
